      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// REST TIMER COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function RestTimer({ seconds, onDone, onSkip }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(true);
  useEffect(() => {
    if (!running) return;
    if (remaining <= 0) { onDone(); return; }
    const t = setTimeout(() => setRemaining(r => r-1), 1000);
    return () => clearTimeout(t);
  }, [remaining, running]);
  const pct = remaining / seconds;
  const color = pct > 0.5 ? T.green : pct > 0.25 ? T.amber : T.red;
  return (
    <div style={{ textAlign:"center", padding:"20px 0" }}>
      <div style={{ fontSize:11, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Rest</div>
      <div style={{ position:"relative", width:100, height:100, margin:"0 auto 16px" }}>
        <svg viewBox="0 0 100 100" width="100" height="100">
          <circle cx="50" cy="50" r="44" fill="none" stroke={T.border} strokeWidth="8" />
          <circle cx="50" cy="50" r="44" fill="none" stroke={color} strokeWidth="8"
            strokeDasharray={`${2*Math.PI*44}`}
            strokeDashoffset={`${2*Math.PI*44*(1-pct)}`}
            strokeLinecap="round"
            transform="rotate(-90 50 50)"
            style={{ transition:"stroke-dashoffset 1s linear, stroke 0.3s" }} />
        </svg>
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>
          <div style={{ fontSize:28, fontWeight:700, color:T.text }}>{remaining}</div>
          <div style={{ fontSize:10, color:T.dim }}>sec</div>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
        <button style={S.btnSm} onClick={()=>setRunning(r=>!r)}>{running?"Pause":"Resume"}</button>
        <button style={{ ...S.btn, padding:"6px 20px" }} onClick={onSkip}>Skip →</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// WORKOUT LOGGER COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function WorkoutLogger({ exercise, numSets, repMin, repMax, restSeconds, suggWeight, savedWarmups, onSave, onCancel }) {
  const warmupSets = getWarmupSets(exercise, suggWeight || 0, savedWarmups);
  const totalPhases = warmupSets.length + numSets; // warmup sets + working sets
  
  // phase: "warmup-N", "rest-warmup-N", "working-N", "rest-working-N", "done"
  const [phase, setPhase] = useState(warmupSets.length > 0 ? "warmup:0" : "working:0");
  const [loggedSets, setLoggedSets] = useState([]); // working sets only
  const [currentReps, setCurrentReps] = useState(String(repMax));
  const [currentWeight, setCurrentWeight] = useState(String(suggWeight || ""));
  const [intensity, setIntensity] = useState("medium");

  // Phase format: "warmup:N", "rest-warmup:N", "working:N", "rest-working:N", "done"
  function makePhase(type, idx) { return `${type}:${idx}`; }
  function parsePhase(p) {
    if (p === "done") return { type:"done", idx:0 };
    const colon = p.lastIndexOf(":");
    return { type: p.slice(0, colon), idx: parseInt(p.slice(colon+1)||"0") };
  }

  function completeSet() {
    const { type, idx } = parsePhase(phase);
    if (type === "warmup") {
      setPhase(makePhase("rest-warmup", idx));
    } else if (type === "working") {
      const reps = parseInt(currentReps) || 0;
      const weight = parseFloat(currentWeight) || 0;
      setLoggedSets(prev => [...prev, { reps, weight }]);
      if (idx + 1 < numSets) {
        setPhase(makePhase("rest-working", idx));
      } else {
        setPhase("done");
      }
    }
  }

  function afterRest() {
    const { type, idx } = parsePhase(phase);
    if (type === "rest-warmup") {
      const nextIdx = idx + 1;
      setPhase(nextIdx < warmupSets.length ? makePhase("warmup", nextIdx) : makePhase("working", 0));
    } else if (type === "rest-working") {
      setCurrentReps(String(repMax));
      setPhase(makePhase("working", idx+1));
    }
  }

  const { type, idx } = parsePhase(phase);
  const warmupSet = (type === "warmup" || type === "rest-warmup") ? warmupSets[idx] : null;
  const restSecs = type === "rest-warmup" ? (warmupSets[idx]?.rest || 60) : restSeconds;

  // Progress indicator
  const warmupDone = type === "warmup" ? idx : type === "rest-warmup" ? idx+1 : (type === "working" || type === "rest-working" || type === "done") ? warmupSets.length : 0;
  const workingDone = loggedSets.length;

  return (
    <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:16 }}>
      {/* Progress bar */}
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", gap:4, marginBottom:6 }}>
          {warmupSets.map((_, i) => (
            <div key={`w${i}`} style={{ flex:1, height:4, borderRadius:2, background: i < warmupDone ? T.amber : T.border }} />
          ))}
          {Array(numSets).fill(null).map((_, i) => (
            <div key={`s${i}`} style={{ flex:1, height:4, borderRadius:2, background: i < workingDone ? T.accent : T.border }} />
          ))}
        </div>
        <div style={{ fontSize:10, color:T.dim }}>
          {warmupSets.length > 0 && `${warmupDone}/${warmupSets.length} warmup · `}
          {workingDone}/{numSets} working sets
        </div>
      </div>

      {/* WARMUP SET */}
      {type === "warmup" && warmupSet && (
        <div>
          <div style={{ fontSize:11, color:T.amber, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>
            {warmupSet.label}
          </div>
          <div style={{ fontSize:26, fontWeight:700, color:T.text, marginBottom:4 }}>
            {warmupSet.weight === 0 ? "Bodyweight" : `${warmupSet.weight} lbs`}
            {warmupSet.weight > 0 && <span style={{ fontSize:13, color:T.muted }}> × {warmupSet.reps} reps</span>}
          </div>
          <button style={{ ...S.btn, width:"100%", marginTop:12 }} onClick={completeSet}>Done ✓</button>
        </div>
      )}

      {/* REST TIMER */}
      {(type === "rest-warmup" || type === "rest-working") && (
        <RestTimer seconds={restSecs} onDone={afterRest} onSkip={afterRest} />
      )}

      {/* WORKING SET */}
      {type === "working" && (
        <div>
          <div style={{ fontSize:11, color:T.accent, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>
            Set {idx+1} of {numSets}
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:10, color:T.muted, marginBottom:4 }}>Reps</div>
              <input style={{ ...S.input, fontSize:20, fontWeight:700, textAlign:"center" }} type="number"
                value={currentReps} onChange={e=>setCurrentReps(e.target.value)} />
            </div>
            <div style={{ fontSize:18, color:T.dim, paddingTop:20 }}>×</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:10, color:T.muted, marginBottom:4 }}>Weight (lbs)</div>
              <input style={{ ...S.input, fontSize:20, fontWeight:700, textAlign:"center" }} type="number"
                value={currentWeight} onChange={e=>setCurrentWeight(e.target.value)} />
            </div>
          </div>
          {suggWeight && <div style={{ fontSize:11, color:T.dim, marginBottom:12 }}>Target: {suggWeight} lbs × {repMin}–{repMax} reps</div>}
          <button style={{ ...S.btn, width:"100%" }} onClick={completeSet}>Done ✓</button>
        </div>
      )}

      {/* DONE — rate intensity */}
      {phase === "done" && (
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:T.text, marginBottom:12 }}>How did that feel?</div>
          <div style={{ display:"flex", gap:6, marginBottom:16 }}>
            {["easy","medium","hard","very hard"].map(level => (
              <button key={level} onClick={()=>setIntensity(level)}
                style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                  background: intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                  color: intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                  border:`1px solid ${intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                }}>{level}</button>
            ))}
          </div>
          <div style={{ fontSize:11, color:T.dim, marginBottom:12 }}>
            {loggedSets.map((s,i)=>`Set ${i+1}: ${s.reps}×${s.weight}`).join(" · ")}
          </div>
          <button style={{ ...S.btn, width:"100%", marginBottom:8 }} onClick={()=>onSave(loggedSets, intensity)}>Save & Next →</button>
          <button style={{ ...S.btnSm, width:"100%" }} onClick={onCancel}>Cancel</button>
        </div>
      )}

      <button style={{ background:"transparent", border:"none", color:T.dim, fontSize:11, cursor:"pointer", marginTop:8 }} onClick={onCancel}>
        ← Cancel
      </button>
    </div>
  );
}

function NextWorkoutTab({ workouts, currentWeek, userId, onWorkoutAdded, program, readOnly=false, manualWeek, setManualWeek, autoWeek, demoMode=false, weekStartDate: nwsd=weekStartDate }) {
  const programDays = program?.days || DEFAULT_PROGRAM.days;
  const dayNames = programDays.map(d => d.name);
  const [selectedDay, setSelectedDay] = useState(dayNames[0]);
  const [expandedEx, setExpandedEx] = useState(null);
  const [logSets, setLogSets] = useState([{ reps:"", weight:"" }]);
  const [logNotes, setLogNotes] = useState("");
  const [logIntensity, setLogIntensity] = useState("medium");
  const [saving, setSaving] = useState(false);
  // Week 1 setup: weight inputs per exercise
  const [week1Weights, setWeek1Weights] = useState({});
  const [savingWeek1, setSavingWeek1] = useState(false);

  const isWeek1Setup = currentWeek === 1 && workouts.length === 0;

  const currentDayConfig = programDays.find(d => d.name === selectedDay) || programDays[0];
  const dayColor = DAY_COLORS[selectedDay] || T.accent;

  const dayExercises = useMemo(() => {
    return currentDayConfig.exercises.map(exEntry => {
      const ex = exName(exEntry);
      const numSets = exSets(exEntry);
      const repMin = exRepMin(exEntry);
      const repMax = exRepMax(exEntry);
      const increment = exIncrement(exEntry);
      const hist = getExHistory(workouts, ex);
      const histSameDay = hist.filter(h=>h.day===selectedDay);
      const currentEntry = histSameDay.find(h=>h.week===currentWeek)||null;
      const histUpToPrev = hist.filter(h=>h.week<currentWeek);
      const histUpToCurrent = hist.filter(h=>h.week<=currentWeek);
      const prevEntry = histUpToPrev.slice(-1)[0]||null;
      const suggCurrent = !currentEntry ? getSuggestion(histUpToPrev, isDeloadWeek(currentWeek), ex, repMin, repMax, increment) : null;
      const suggNext = getSuggestion(histUpToCurrent, isDeloadWeek(currentWeek+1), ex, repMin, repMax, increment);
      return { exercise:ex, numSets, repMin, repMax, currentEntry, prevEntry, suggCurrent, suggNext, warmups: exEntry.warmups || null };
    });
  }, [workouts, selectedDay, currentWeek, program]);

  function openLog(ex, sugg, numSets) {
    setExpandedEx(ex);
    setLogNotes("");
    setLogIntensity("medium");
    const w = sugg?.suggestedWeight || "";
    setLogSets(Array(numSets).fill(null).map(()=>({ reps:"", weight:w })));
  }

  function closeLog() { setExpandedEx(null); }

  async function saveLog(exercise) {
    const sets = logSets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)}));
    if (!sets.length) return;
    setSaving(true);
    const today = new Date().toISOString().split("T")[0];
    const entry = { week:currentWeek, day:selectedDay, date:today, exercise, sets, notes:logNotes, intensity:logIntensity };
    if (!demoMode) await Storage.addWorkout(userId, entry);
    onWorkoutAdded(entry);
    setSaving(false);
    setExpandedEx(null);
  }

  async function saveWeek1() {
    const exercises = currentDayConfig.exercises;
    const hasWeights = exercises.some(ex => week1Weights[exName(ex)]);
    if (!hasWeights) return;
    setSavingWeek1(true);
    const today = new Date().toISOString().split("T")[0];
    for (const exEntry of exercises) {
      const ex = exName(exEntry);
      const numSets = exSets(exEntry);
      const w = Number(week1Weights[ex]);
      if (!w) continue;
      const [rMin] = REP_SCHEMES[ex] || [8,12];
      const sets = Array(numSets).fill(null).map(()=>({ reps:rMin, weight:w }));
      const entry = { week:1, day:selectedDay, date:today, exercise:ex, sets, notes:"Starting weight", intensity:"medium" };
      if (!demoMode) await Storage.addWorkout(userId, entry);
      onWorkoutAdded(entry);
    }
    setSavingWeek1(false);
  }

  const [addingOneOff, setAddingOneOff] = useState(false);
  const [editingDoneEx, setEditingDoneEx] = useState(null);
  const [oneOffEx, setOneOffEx] = useState("");
  const [oneOffSets, setOneOffSets] = useState([{reps:"",weight:""}]);
  const [oneOffNotes, setOneOffNotes] = useState("");
  const [oneOffIntensity, setOneOffIntensity] = useState("medium");
  const [savingOneOff, setSavingOneOff] = useState(false);

  async function saveOneOff() {
    if (!oneOffEx.trim()) return;
    const sets = oneOffSets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)}));
    if (!sets.length) return;
    setSavingOneOff(true);
    const today = new Date().toISOString().split("T")[0];
    const entry = { week:currentWeek, day:selectedDay, date:today, exercise:oneOffEx.trim(), sets, notes:oneOffNotes, intensity:oneOffIntensity };
    if (!demoMode) await Storage.addWorkout(userId, entry);
    onWorkoutAdded(entry);
    setSavingOneOff(false);
    setAddingOneOff(false);
    setOneOffEx(""); setOneOffSets([{reps:"",weight:""}]); setOneOffNotes(""); setOneOffIntensity("medium");
  }

  return (
    <div>
      {/* Week selector */}
      {(
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
          <button style={S.btnSm} onClick={()=>!readOnly && setManualWeek(w => Math.max(1, (w ?? autoWeek) - 1))} disabled={readOnly}>−</button>
          <span style={{ fontSize:15, fontWeight:700, color:T.accent, minWidth:60, textAlign:"center" }}>Week {currentWeek}</span>
          <button style={S.btnSm} onClick={()=>!readOnly && setManualWeek(w => (w ?? autoWeek) + 1)} disabled={readOnly}>+</button>
          {!readOnly && manualWeek !== null && manualWeek !== autoWeek && (
            <button style={{ ...S.btnSm, fontSize:10 }} onClick={()=>setManualWeek(null)}>↩ Current</button>
          )}
          {(() => {
            const d = new Date(nwsd(currentWeek) + "T12:00:00");
            const label = d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
            return <span style={{ fontSize:11, color:T.dim }}>· {label}</span>;
          })()}
        </div>
      )}

      {/* Day selector */}
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {dayNames.map(d => (
          <button key={d} onClick={()=>{ setSelectedDay(d); setExpandedEx(null); }}
            style={{ ...S.btnSm, background:selectedDay===d?(DAY_COLORS[d]||T.accent)+"22":T.border, color:selectedDay===d?(DAY_COLORS[d]||T.accent):T.muted, border:`1px solid ${selectedDay===d?(DAY_COLORS[d]||T.accent)+"55":T.border}` }}>
            {d}
          </button>
        ))}
        <span style={{ fontSize:11, color:isDeloadWeek(currentWeek+1)?T.green:T.dim, alignSelf:"center", marginLeft:4 }}>
          {isDeloadWeek(currentWeek+1)?`🔄 Week ${currentWeek+1} is deload`:`Next: Week ${currentWeek+1}`}
        </span>
      </div>
      {currentWeek === 1 && !dayExercises.some(e=>e.currentEntry) && (
        <div style={{ ...S.card, marginBottom:16, border:`1px solid ${T.accent}44`, background:T.accent+"11" }}>
          <div style={{ fontSize:12, fontWeight:700, color:T.accent, marginBottom:4 }}>👋 Week 1 Setup</div>
          <div style={{ fontSize:11, color:T.muted, marginBottom:12 }}>Enter your starting weights for {selectedDay}. Use a weight you can do comfortably for the target reps.</div>
          {currentDayConfig.exercises.map(exEntry => {
            const ex = exName(exEntry);
            const numSets = exSets(exEntry);
            const [repMin, repMax] = REP_SCHEMES[ex] || [8,12];
            return (
              <div key={ex} style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:8, alignItems:"center", marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:12, fontWeight:600, color:T.text }}>{ex}</div>
                  <div style={{ fontSize:10, color:T.dim }}>{numSets} sets × {repMin}–{repMax} reps</div>
                </div>
                <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs"
                  value={week1Weights[ex]||""}
                  onChange={e=>setWeek1Weights(w=>({...w,[ex]:e.target.value}))} />
              </div>
            );
          })}
          <button style={{ ...S.btn, marginTop:8, width:"100%" }} onClick={saveWeek1} disabled={savingWeek1}>
            {savingWeek1 ? "Saving…" : `Save ${selectedDay} Starting Weights`}
          </button>
        </div>
      )}

      {/* Normal exercise cards */}
      {dayExercises.map(({ exercise, numSets, repMin, repMax, currentEntry, prevEntry, suggCurrent, suggNext, warmups }) => {
        const isExpanded = expandedEx === exercise;
        const isDone = !!currentEntry;
        const restSecs = REST_PERIODS[exercise] || null;
        const isEditingDone = editingDoneEx === exercise;
        return (
          <div key={exercise} style={{ ...S.card, marginBottom:10 }}>
            {/* Header row */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
              <div>
                <div style={{ fontWeight:700, fontSize:13, color:T.text }}>{exercise} {isDone && <span style={{ color:T.green }}>✓</span>}</div>
                {prevEntry && (
                  <div style={{ fontSize:11, color:T.dim, marginTop:3 }}>
                    W{prevEntry.week}: {prevEntry.sets.map(s=>`${s.reps}×${s.weight}`).join(", ")}
                  </div>
                )}
                {restSecs && !isExpanded && (
                  <div style={{ fontSize:10, color:T.dim, marginTop:3 }}>⏱ {formatRest(restSecs)} rest</div>
                )}
              </div>
              <div style={{ display:"flex", gap:6 }}>
                {isDone && !readOnly && (
                  <button onClick={()=>setEditingDoneEx(isEditingDone ? null : exercise)}
                    style={{ ...S.btnSm, fontSize:11, padding:"4px 10px" }}>
                    {isEditingDone ? "Cancel" : "Edit"}
                  </button>
                )}
                {!isDone && !readOnly && (
                  <button onClick={()=>isExpanded ? closeLog() : openLog(exercise, suggCurrent, numSets)}
                    style={{ ...S.btn, padding:"6px 14px", fontSize:11,
                      background: isExpanded ? T.border : T.accent,
                      color: isExpanded ? T.muted : "#0f2220" }}>
                    {isExpanded ? "Cancel" : "Log"}
                  </button>
                )}
              </div>
            </div>

            {/* Two-column: current week target | next week preview */}
            {!isExpanded && !isEditingDone && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                <div style={{ borderRight:`1px solid ${T.border}`, paddingRight:16 }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700, marginBottom:8, color:isDone?T.green:T.accent }}>
                    Week {currentWeek} — {isDone?"✓ Logged":"Target"}
                  </div>
                  {isDone ? (
                    <>
                      <SetsDisplay sets={currentEntry.sets} />
                      <div style={{ fontSize:11, color:T.dim, marginTop:6 }}>{currentEntry.sets.length} sets logged</div>
                    </>
                  ) : suggCurrent ? (
                    <>
                      <div style={{ fontSize:26, fontWeight:700, color:T.text }}>{suggCurrent.suggestedWeight}<span style={{ fontSize:12, color:T.muted }}> lbs</span></div>
                      <div style={{ fontSize:13, color:T.muted, marginTop:2 }}>{`× ${suggCurrent.repMin}–${suggCurrent.repMax} reps`}</div>
                      <div style={{ fontSize:11, color:T.dim, marginTop:6, lineHeight:1.5 }}>{suggCurrent.note}</div>
                    </>
                  ) : <div style={{ fontSize:11, color:T.dim }}>No history yet.</div>}
                </div>
                <div>
                  <div style={{ fontSize:10, color:T.dim, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700, marginBottom:8 }}>
                    Week {currentWeek+1} Preview {isDeloadWeek(currentWeek+1)?"🔄":""}
                  </div>
                  {suggNext ? (
                    <>
                      <div style={{ fontSize:26, fontWeight:700, color:"#6b8884" }}>{suggNext.suggestedWeight}<span style={{ fontSize:12, color:T.dim }}> lbs</span></div>
                      <div style={{ fontSize:13, color:T.dim, marginTop:2 }}>{`× ${suggNext.repMin}–${suggNext.repMax} reps`}</div>
                      <div style={{ fontSize:11, color:T.dim, marginTop:6, lineHeight:1.5 }}>{suggNext.note}</div>
                    </>
                  ) : <div style={{ fontSize:11, color:T.dim }}>No history yet.</div>}
                </div>
              </div>
            )}

            {/* Edit logged workout inline */}
            {isEditingDone && currentEntry && !readOnly && (
              <EditWorkoutInline
                entry={currentEntry}
                onSave={async (sets, intensity, notes) => {
                  await Storage.updateWorkout(userId, currentEntry.id, { sets, intensity, notes });
                  onWorkoutAdded();
                  setEditingDoneEx(null);
                }}
                onCancel={()=>setEditingDoneEx(null)}
              />
            )}

            {/* Workout Logger */}
            {isExpanded && !readOnly && (
              <WorkoutLogger
                exercise={exercise}
                numSets={numSets}
                repMin={repMin}
                repMax={repMax}
                restSeconds={restSecs || 60}
                suggWeight={suggCurrent?.suggestedWeight}
                savedWarmups={warmups}
                onSave={async (sets, intensity) => {
                  const today = new Date().toISOString().split("T")[0];
                  const entry = { week:currentWeek, day:selectedDay, date:today, exercise, sets, notes:"", intensity };
                  if (!demoMode) await Storage.addWorkout(userId, entry);
                  onWorkoutAdded(entry);
                  closeLog();
                  const allEx = dayExercises.map(e=>e.exercise);
                  const nextIdx = allEx.indexOf(exercise) + 1;
                  if (nextIdx < allEx.length) {
                    const nextEx = dayExercises[nextIdx];
                    if (!nextEx.currentEntry) openLog(allEx[nextIdx], nextEx.suggCurrent, nextEx.numSets);
                  }
                }}
                onCancel={closeLog}
              />
            )}
          </div>
        );
      })}

      {/* Add one-off exercise */}
      {!readOnly && !addingOneOff && (
        <button style={{ ...S.btnSm, width:"100%", marginTop:8, borderStyle:"dashed" }} onClick={()=>setAddingOneOff(true)}>
          + Add Exercise
        </button>
      )}
      {!readOnly && addingOneOff && (
        <div style={{ ...S.card, marginTop:8, border:`1px solid ${T.accent}44` }}>
          <div style={{ fontSize:11, fontWeight:700, color:T.accent, marginBottom:10 }}>Add Exercise — {selectedDay} W{currentWeek}</div>
          <input style={{ ...S.input, marginBottom:10 }} placeholder="Exercise name…" value={oneOffEx}
            onChange={e=>setOneOffEx(e.target.value)} />
          <div style={{ marginBottom:8 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Sets (reps / weight)</div>
            {oneOffSets.map((s,i) => (
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                <input style={{ ...S.input, width:70 }} type="number" placeholder="reps" value={s.reps}
                  onChange={e=>setOneOffSets(sets=>{ const n=[...sets]; n[i]={...n[i],reps:e.target.value}; return n; })} />
                <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs" value={s.weight}
                  onChange={e=>setOneOffSets(sets=>{ const n=[...sets]; n[i]={...n[i],weight:e.target.value}; return n; })} />
                {oneOffSets.length>1 && <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14 }}
                  onClick={()=>setOneOffSets(s=>s.filter((_,j)=>j!==i))}>×</button>}
              </div>
            ))}
            <button style={S.btnSm} onClick={()=>setOneOffSets(s=>[...s,{reps:"",weight:s[s.length-1]?.weight||""}])}>+ Set</button>
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Intensity</div>
            <div style={{ display:"flex", gap:6 }}>
              {["easy","medium","hard","very hard"].map(level => (
                <button key={level} onClick={()=>setOneOffIntensity(level)}
                  style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                    background: oneOffIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                    color: oneOffIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                    border: `1px solid ${oneOffIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                  }}>{level}</button>
              ))}
            </div>
          </div>
          <input style={{ ...S.input, marginBottom:10 }} value={oneOffNotes} onChange={e=>setOneOffNotes(e.target.value)} placeholder="Notes (optional)" />
          <div style={{ display:"flex", gap:8 }}>
            <button style={{ ...S.btn, flex:1 }} onClick={saveOneOff} disabled={savingOneOff}>{savingOneOff?"Saving…":"Save"}</button>
            <button style={{ ...S.btnSm, flex:1 }} onClick={()=>setAddingOneOff(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// EXERCISE TAB
// ─────────────────────────────────────────────────────────────────────────────
function ExerciseTab({ workouts, currentWeek }) {
  const allExercises = useMemo(()=>[...new Set(workouts.map(w=>w.exercise))].sort(),[workouts]);
  const [selected, setSelected] = useState(allExercises[0]||"");
  useEffect(()=>{ if (!selected && allExercises.length) setSelected(allExercises[0]); },[allExercises]);

  const hist = useMemo(()=>getExHistory(workouts,selected),[workouts,selected]);
  const suggestion = useMemo(()=>getSuggestion(hist,isDeloadWeek(currentWeek+1),selected),[hist,currentWeek,selected]);
  const chartData = hist.map(h=>({ x:h.week, y:Math.max(...h.sets.map(s=>s.weight)) }));

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <label style={S.label}>Exercise</label>
        <select style={{ ...S.select, maxWidth:300 }} value={selected} onChange={e=>setSelected(e.target.value)}>
          {allExercises.map(ex=><option key={ex}>{ex}</option>)}
        </select>
      </div>
      <div style={{ ...S.grid2, marginBottom:16 }}>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Weight Trend</div>
          <MiniChart data={chartData} color={T.accent} />
          <div style={{ marginTop:8, fontSize:11, color:T.muted }}>
            {chartData.length>=2 && (() => {
              const gain = chartData[chartData.length-1].y - chartData[0].y;
              return <span style={{ color:gain>=0?T.green:T.red }}>{gain>=0?"+":""}{gain} lbs since W{chartData[0].x}</span>;
            })()}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Week {currentWeek+1} Target</div>
          {suggestion ? (
            <>
              <div style={{ fontSize:28, fontWeight:700, color:T.accent }}>{suggestion.suggestedWeight}<span style={{ fontSize:13, color:T.muted }}> lbs</span></div>
              <div style={{ fontSize:12, color:T.muted, marginTop:4 }}>{suggestion.repMin}–{suggestion.repMax} reps</div>
              <div style={{ fontSize:11, color:T.dim, marginTop:8, lineHeight:1.5 }}>{suggestion.note}</div>
            </>
          ) : <div style={{ fontSize:12, color:T.dim }}>Not enough data.</div>}
        </div>
      </div>
      <div style={S.card}>
        <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Session History</div>
        {hist.length===0 && <div style={{ fontSize:12, color:T.dim }}>No data yet.</div>}
        {[...hist].reverse().map((h,i) => (
          <div key={i} style={{ padding:"10px 0", borderBottom:`1px solid ${T.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <div style={{ fontSize:12, fontWeight:600 }}>Week {h.week} <span style={{ color:T.dim, fontWeight:400 }}>— {h.day}</span>
                {h.intensity && h.intensity !== "medium" && <span style={{ ...S.tag({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[h.intensity]||T.dim), marginLeft:6, fontSize:9 }}>{h.intensity}</span>}
              </div>
              <span style={{ fontSize:11, color:T.accent, fontWeight:700 }}>e1RM: {Math.round(avgE1rm(h.sets))}</span>
            </div>
            <div style={{ fontSize:11, color:T.muted }}>
              {(() => {
                const weights = h.sets.map(s=>s.weight);
                const uniform = weights.every(w=>w===weights[0]);
                if (uniform) return <span>{h.sets.map(s=>s.reps).join(", ")} reps @ {weights[0]}lbs</span>;
                return h.sets.map((s,j)=><span key={j} style={{ marginRight:10 }}>{s.reps}×{s.weight}lbs</span>);
              })()}
            </div>
            {h.notes && <div style={{ fontSize:10, color:T.amber, marginTop:4 }}>⚠ {h.notes}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// LOG TAB
// ─────────────────────────────────────────────────────────────────────────────
function LogTab({ workouts, nutrition, metrics, cardio, currentWeek, userId, onWorkoutAdded, onNutritionUpsert, onMetricUpsert, onCardioAdded, demoMode=false, calTarget=calTarget, proteinTarget=proteinTarget, weekStartDate: wsd=weekStartDate }) {
  const today = new Date().toISOString().slice(0,10);
  const allExercises = [...new Set(workouts.map(w=>w.exercise))].sort();

  const [wForm, setWForm] = useState({ week:currentWeek, day:DAYS[0], date:wsd(currentWeek), exercise:allExercises[0]||"", sets:[{reps:"",weight:""}], notes:"", intensity:"medium" });
  const [nForm, setNForm] = useState({ date:today, calories:"", protein:"" });
  const [mForm, setMForm] = useState({ date:today, weight:"", bodyFat:"" });
  const [cForm, setCForm] = useState({ date:today, type:"steady", duration:"", distance:"", speed:"", incline:"", heartRate:"", intervals:"" });
  const [cSuccess, setCSuccess] = useState("");

  function addSet() { setWForm(f=>({...f,sets:[...f.sets,{reps:"",weight:""}]})); }
  function removeSet(i) { setWForm(f=>({...f,sets:f.sets.filter((_,j)=>j!==i)})); }
  function updateSet(i,field,val) { setWForm(f=>{ const sets=[...f.sets]; sets[i]={...sets[i],[field]:val==""?"":Number(val)}; return {...f,sets}; }); }

  async function submitWorkout() {
    const entry = { ...wForm, week:Number(wForm.week), sets:wForm.sets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)})) };
    if (!entry.sets.length) return;
    if (!demoMode) await Storage.addWorkout(userId, entry);
    onWorkoutAdded(entry);
    setWForm(f=>({...f,sets:[{reps:"",weight:""}],notes:"",intensity:"medium"}));
  }

  async function deleteWorkout(id) {
    if (!window.confirm("Delete this entry?")) return;
    if (!demoMode) await Storage.deleteWorkout(userId, id);
    onWorkoutAdded();
  }
  function startEditWorkout(w) {
    setEditingWorkout(w.id);
    setEditWValues({ sets: w.sets.map(s=>({...s, reps:String(s.reps), weight:String(s.weight)})), notes: w.notes||"", intensity: w.intensity||"medium" });
  }
  async function saveEditWorkout(id) {
    const sets = editWValues.sets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)}));
    if (!sets.length) return;
    if (!demoMode) await Storage.updateWorkout(userId, id, { sets, notes:editWValues.notes, intensity:editWValues.intensity });
    setEditingWorkout(null);
    onWorkoutAdded();
  }

  async function submitNutrition() {
    if (!nForm.calories && !nForm.protein) return;
    const entry = { date:nForm.date, calories:nForm.calories?Number(nForm.calories):null, protein:nForm.protein?Number(nForm.protein):null };
    if (!demoMode) await Storage.upsertNutrition(userId, entry);
    onNutritionUpsert(entry);
    setNForm(f=>({...f,calories:"",protein:""}));
  }

  async function submitCardio() {
    if (!cForm.duration) return;
    const entry = {
      date: cForm.date, type: cForm.type, duration: Number(cForm.duration),
      distance: cForm.distance ? Number(cForm.distance) : null,
      speed: cForm.speed ? Number(cForm.speed) : null,
      incline: cForm.incline ? Number(cForm.incline) : null,
      heart_rate: cForm.heartRate ? Number(cForm.heartRate) : null,
      intervals: cForm.intervals || null,
    };
    if (!demoMode) await Storage.addCardio(userId, entry);
    onCardioAdded(entry);
    setCForm(f=>({...f,duration:"",distance:"",speed:"",incline:"",heartRate:"",intervals:""}));
    setCSuccess("Saved!"); setTimeout(()=>setCSuccess(""),2000);
  }

  async function deleteCardio(id) {
    if (!window.confirm("Delete this cardio entry?")) return;
    if (!demoMode) await Storage.deleteCardio(userId, id);
    onCardioAdded();
  }

  const [mError, setMError] = useState("");
  const [mSuccess, setMSuccess] = useState("");

  async function submitMetric() {
    if (!mForm.weight) { setMError("Weight is required."); return; }
    setMError(""); setMSuccess("");
    try {
      const entry = { date:mForm.date, weight:Number(mForm.weight), bodyFat:mForm.bodyFat?Number(mForm.bodyFat):null };
      if (!demoMode) await Storage.upsertMetric(userId, entry);
      onMetricUpsert(entry);
      setMSuccess("Saved!");
      setTimeout(() => setMSuccess(""), 2000);
      setMForm(f=>({...f,weight:"",bodyFat:""}));
    } catch(e) {
      setMError("Failed to save: " + (e.message || "unknown error"));
    }
  }

  const [editingNutrition, setEditingNutrition] = useState(null); // date string
  const [editingMetric, setEditingMetric] = useState(null);       // date string
  const [editingWorkout, setEditingWorkout] = useState(null);     // workout id
  const [editWValues, setEditWValues] = useState({ sets:[], notes:"", intensity:"medium" });
  const [editNValues, setEditNValues] = useState({});
  const [editMValues, setEditMValues] = useState({});

  function startEditNutrition(n) {
    setEditingNutrition(n.date);
    setEditNValues({ calories: n.calories ?? "", protein: n.protein ?? "" });
  }
  async function saveEditNutrition(date) {
    const entry = { date, calories: editNValues.calories !== "" ? Number(editNValues.calories) : null, protein: editNValues.protein !== "" ? Number(editNValues.protein) : null };
    if (!demoMode) await Storage.upsertNutrition(userId, entry);
    onNutritionUpsert(entry);
    setEditingNutrition(null);
  }

  function startEditMetric(m) {
    setEditingMetric(m.date);
    setEditMValues({ weight: m.weight ?? "", bodyFat: m.bodyFat ?? "" });
  }
  async function saveEditMetric(date) {
    const entry = { date, weight: editMValues.weight !== "" ? Number(editMValues.weight) : null, bodyFat: editMValues.bodyFat !== "" ? Number(editMValues.bodyFat) : null };
    if (!demoMode) await Storage.upsertMetric(userId, entry);
    onMetricUpsert(entry);
    setEditingMetric(null);
  }

  const recentNutrition = [...nutrition].reverse().slice(0,14);
  const recentMetrics = [...metrics].reverse().slice(0,10);

  return (
    <div>
      <div style={{ ...S.grid2, marginBottom:16 }}>
        {/* Workout log */}
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Workout</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div><label style={S.label}>Week</label><input style={S.input} type="number" value={wForm.week} onChange={e=>setWForm(f=>({...f,week:e.target.value,date:wsd(Number(e.target.value)||1)}))} /></div>
            <div><label style={S.label}>Date</label><input style={S.input} type="date" value={wForm.date} onChange={e=>setWForm(f=>({...f,date:e.target.value}))} /></div>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Day</label>
            <select style={S.select} value={wForm.day} onChange={e=>setWForm(f=>({...f,day:e.target.value}))}>
              {DAYS.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Exercise</label>
            <input style={S.input} list="ex-list" value={wForm.exercise} onChange={e=>setWForm(f=>({...f,exercise:e.target.value}))} placeholder="Type or select..." />
            <datalist id="ex-list">{allExercises.map(ex=><option key={ex} value={ex}/>)}</datalist>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Sets (reps / weight lbs)</label>
            {wForm.sets.map((s,i)=>(
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                <input style={{ ...S.input, width:70 }} type="number" placeholder="reps" value={s.reps} onChange={e=>updateSet(i,"reps",e.target.value)} />
                <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs" value={s.weight} onChange={e=>updateSet(i,"weight",e.target.value)} />
                {wForm.sets.length>1&&<button style={S.btnDanger} onClick={()=>removeSet(i)}>✕</button>}
              </div>
            ))}
            <button style={S.btnSm} onClick={addSet}>+ Add Set</button>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Intensity</label>
            <div style={{ display:"flex", gap:6 }}>
              {["easy","medium","hard","very hard"].map(level => (
                <button key={level} onClick={()=>setWForm(f=>({...f,intensity:level}))}
                  style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                    background: wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                    color: wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                    border: `1px solid ${wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                  }}>
                  {level}
                </button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:14 }}>
            <label style={S.label}>Notes (optional)</label>
            <input style={S.input} value={wForm.notes} onChange={e=>setWForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. modified grip" />
          </div>
          <button style={S.btn} onClick={submitWorkout}>Save Workout</button>
        </div>

        {/* Right column */}
        <div>
          <div style={{ ...S.card, marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Nutrition</div>
          <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={nForm.date} onChange={e=>setNForm(f=>({...f,date:e.target.value}))} /></div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
            <div><label style={S.label}>Calories</label><input style={S.input} type="number" value={nForm.calories} onChange={e=>setNForm(f=>({...f,calories:e.target.value}))} placeholder={String(calTarget)} /></div>
            <div><label style={S.label}>Protein (g)</label><input style={S.input} type="number" value={nForm.protein} onChange={e=>setNForm(f=>({...f,protein:e.target.value}))} placeholder={String(proteinTarget)} /></div>
          </div>
          <button style={S.btn} onClick={submitNutrition}>Save</button>
          </div>
          <div style={{ ...S.card, marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Body Metrics</div>
          <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={mForm.date} onChange={e=>setMForm(f=>({...f,date:e.target.value}))} /></div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
            <div><label style={S.label}>Weight (lbs)</label><input style={S.input} type="number" value={mForm.weight} onChange={e=>setMForm(f=>({...f,weight:e.target.value}))} /></div>
            <div><label style={S.label}>Body Fat %</label><input style={S.input} type="number" value={mForm.bodyFat} onChange={e=>setMForm(f=>({...f,bodyFat:e.target.value}))} /></div>
          </div>
          {mError && <div style={{ color:T.red, fontSize:11, marginBottom:8 }}>{mError}</div>}
          {mSuccess && <div style={{ color:T.green, fontSize:11, marginBottom:8 }}>{mSuccess}</div>}
          <button style={S.btn} onClick={submitMetric}>Save</button>
          </div>
          <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Cardio</div>
          <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={cForm.date} onChange={e=>setCForm(f=>({...f,date:e.target.value}))} /></div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Type</label>
            <div style={{ display:"flex", gap:6 }}>
              {["steady","hiit"].map(t=>(
                <button key={t} onClick={()=>setCForm(f=>({...f,type:t}))}
                  style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                    background: cForm.type===t ? T.accent+"33" : T.border,
                    color: cForm.type===t ? T.accent : T.muted,
                    border: `1px solid ${cForm.type===t ? T.accent+"66" : T.border}` }}>
                  {t === "steady" ? "Steady State" : "HIIT"}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div><label style={S.label}>Duration (min)</label><input style={S.input} type="number" value={cForm.duration} onChange={e=>setCForm(f=>({...f,duration:e.target.value}))} /></div>
            <div><label style={S.label}>Avg Heart Rate</label><input style={S.input} type="number" value={cForm.heartRate} onChange={e=>setCForm(f=>({...f,heartRate:e.target.value}))} placeholder="bpm" /></div>
          </div>
          {cForm.type === "steady" ? (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
              <div><label style={S.label}>Distance (mi)</label><input style={S.input} type="number" step="0.1" value={cForm.distance} onChange={e=>setCForm(f=>({...f,distance:e.target.value}))} /></div>
              <div><label style={S.label}>Speed (mph)</label><input style={S.input} type="number" step="0.1" value={cForm.speed} onChange={e=>setCForm(f=>({...f,speed:e.target.value}))} /></div>
              <div><label style={S.label}>Incline (%)</label><input style={S.input} type="number" step="0.5" value={cForm.incline} onChange={e=>setCForm(f=>({...f,incline:e.target.value}))} /></div>
            </div>
          ) : (
            <div style={{ marginBottom:14 }}>
              <label style={S.label}>Intervals (e.g. 8×30s on/30s off)</label>
              <input style={S.input} value={cForm.intervals} onChange={e=>setCForm(f=>({...f,intervals:e.target.value}))} placeholder="8×30s on/30s off" />
            </div>
          )}
          {cSuccess && <div style={{ color:T.green, fontSize:11, marginBottom:8 }}>{cSuccess}</div>}
          <button style={S.btn} onClick={submitCardio}>Save</button>
          </div>
        </div>
      </div>

      {/* Recent cardio */}
      {(cardio||[]).length > 0 && (
        <div style={{ ...S.card, marginTop:16 }}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Recent Cardio</div>
          {[...(cardio||[])].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(c=>(
            <div key={c.id} style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:8, padding:"8px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center" }}>
              <div>
                <span style={{ fontWeight:600, textTransform:"capitalize" }}>{c.type === "steady" ? "Steady State" : "HIIT"}</span>
                <span style={{ color:T.dim, marginLeft:6 }}>{c.date}</span>
                <span style={{ ...S.tag(T.accent), marginLeft:6, fontSize:9 }}>{c.duration}min</span>
                <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>
                  {c.type === "steady" ? [c.speed&&`${c.speed}mph`, c.incline&&`${c.incline}% incline`, c.distance&&`${c.distance}mi`].filter(Boolean).join(" · ") : c.intervals||""}
                  {c.heart_rate && <span style={{ color:T.red, marginLeft:6 }}>♥ {c.heart_rate}bpm</span>}
                </div>
              </div>
              <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14, padding:"2px 6px" }} onClick={()=>deleteCardio(c.id)} title="Delete">×</button>
            </div>
          ))}
        </div>
      )}
      {workouts.length > 0 && (() => {
        const recent = [...workouts].sort((a,b) => b.week-a.week || b.date.localeCompare(a.date)).slice(0,20);
        return (
          <div style={{ ...S.card, marginTop:16 }}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Recent Workouts — click to edit</div>
            {recent.map(w => {
              const intColor = {easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[w.intensity] || T.dim;
              const isEditing = editingWorkout === w.id;
              return (
                <div key={w.id} style={{ borderTop:`1px solid ${T.border}` }}>
                  {/* View row */}
                  {!isEditing && (
                    <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:8, padding:"8px 4px", fontSize:12, alignItems:"center", cursor:"pointer" }}
                      onClick={()=>startEditWorkout(w)}>
                      <div>
                        <span style={{ fontWeight:600 }}>{w.exercise}</span>
                        <span style={{ color:T.dim, marginLeft:6 }}>W{w.week} · {w.day} · {w.date}</span>
                        {w.intensity && w.intensity !== "medium" && <span style={{ ...S.tag(intColor), marginLeft:6, fontSize:9 }}>{w.intensity}</span>}
                        {w.notes && <span style={{ color:T.amber, marginLeft:6, fontSize:10 }}>⚠ {w.notes}</span>}
                        <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{w.sets.map(s=>`${s.reps}×${s.weight}`).join(", ")}</div>
                      </div>
                      <span style={{ fontSize:10, color:T.dim }}>edit</span>
                    </div>
                  )}
                  {/* Edit form */}
                  {isEditing && (
                    <div style={{ padding:"10px 4px" }}>
                      <div style={{ fontSize:11, fontWeight:600, color:T.accent, marginBottom:8 }}>{w.exercise} · W{w.week} · {w.date}</div>
                      <div style={{ marginBottom:8 }}>
                        <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Sets (reps / weight)</div>
                        {editWValues.sets.map((s,i) => (
                          <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                            <input style={{ ...S.input, width:70 }} type="number" placeholder="reps" value={s.reps}
                              onChange={e=>setEditWValues(v=>{ const sets=[...v.sets]; sets[i]={...sets[i],reps:e.target.value}; return {...v,sets}; })} />
                            <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs" value={s.weight}
                              onChange={e=>setEditWValues(v=>{ const sets=[...v.sets]; sets[i]={...sets[i],weight:e.target.value}; return {...v,sets}; })} />
                            {editWValues.sets.length > 1 && <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14 }}
                              onClick={()=>setEditWValues(v=>({...v,sets:v.sets.filter((_,j)=>j!==i)}))}>×</button>}
                          </div>
                        ))}
                        <button style={S.btnSm} onClick={()=>setEditWValues(v=>({...v,sets:[...v.sets,{reps:"",weight:v.sets[v.sets.length-1]?.weight||""}]}))}>+ Set</button>
                      </div>
                      <div style={{ marginBottom:8 }}>
                        <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Intensity</div>
                        <div style={{ display:"flex", gap:6 }}>
                          {["easy","medium","hard","very hard"].map(level => (
                            <button key={level} onClick={()=>setEditWValues(v=>({...v,intensity:level}))}
                              style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                                background: editWValues.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                                color: editWValues.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                                border: `1px solid ${editWValues.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                              }}>{level}</button>
                          ))}
                        </div>
                      </div>
                      <input style={{ ...S.input, marginBottom:10 }} value={editWValues.notes} onChange={e=>setEditWValues(v=>({...v,notes:e.target.value}))} placeholder="Notes (optional)" />
                      <div style={{ display:"flex", gap:8 }}>
                        <button style={{ ...S.btn, flex:1 }} onClick={()=>saveEditWorkout(w.id)}>Save</button>
                        <button style={{ ...S.btnSm, flex:1 }} onClick={()=>setEditingWorkout(null)}>Cancel</button>
                        <button style={{ ...S.btnSm, color:T.red, border:`1px solid ${T.red}44` }} onClick={()=>{ deleteWorkout(w.id); setEditingWorkout(null); }}>Delete</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Nutrition history */}
      {recentNutrition.length > 0 && (
        <div style={{ ...S.card, marginTop:16 }}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Nutrition History — click a row to edit</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 80px", gap:8, fontSize:10, color:T.dim, marginBottom:6, padding:"0 4px" }}>
            <span>Date</span><span>Calories</span><span>Protein</span><span></span>
          </div>
          {recentNutrition.map(n => {
            const editing = editingNutrition === n.date;
            return (
              <div key={n.date} onClick={()=>!editing&&startEditNutrition(n)}
                style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 80px", gap:8, padding:"7px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center", cursor:editing?"default":"pointer" }}>
                <span style={{ color:T.muted }}>{n.date}</span>
                {editing ? (
                  <>
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editNValues.calories} onChange={e=>setEditNValues(v=>({...v,calories:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editNValues.protein} onChange={e=>setEditNValues(v=>({...v,protein:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <div style={{ display:"flex", gap:4 }}>
                      <button style={{ ...S.btn, padding:"3px 8px", fontSize:11 }} onClick={e=>{e.stopPropagation();saveEditNutrition(n.date);}}>✓</button>
                      <button style={{ ...S.btnSm, padding:"3px 8px" }} onClick={e=>{e.stopPropagation();setEditingNutrition(null);}}>✕</button>
                    </div>
                  </>
                ) : (
                  <>
                    <span style={{ color:n.calories&&n.calories<=calTarget?T.green:n.calories>calTarget?T.red:T.muted }}>{n.calories??"—"}</span>
                    <span style={{ color:n.protein&&n.protein>=proteinTarget?T.green:n.protein?T.amber:T.muted }}>{n.protein??"—"}g</span>
                    <span style={{ fontSize:10, color:T.dim }}>edit</span>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Metrics history */}
      {recentMetrics.length > 0 && (
        <div style={{ ...S.card, marginTop:16 }}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Metrics History — click a row to edit</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr auto", gap:8, fontSize:10, color:T.dim, marginBottom:6, padding:"0 4px" }}>
            <span>Date</span><span>Weight</span><span>Body Fat</span><span></span>
          </div>
          {recentMetrics.map((m,i) => {
            const prev = recentMetrics[i+1];
            const delta = prev&&m.weight&&prev.weight ? (m.weight-prev.weight).toFixed(1) : null;
            const editing = editingMetric === m.date;
            return (
              <div key={m.date} onClick={()=>!editing&&startEditMetric(m)}
                style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr auto", gap:8, padding:"7px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center", cursor:editing?"default":"pointer" }}>
                <span style={{ color:T.muted }}>{m.date}</span>
                {editing ? (
                  <>
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editMValues.weight} onChange={e=>setEditMValues(v=>({...v,weight:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editMValues.bodyFat} onChange={e=>setEditMValues(v=>({...v,bodyFat:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <div style={{ display:"flex", gap:4 }}>
                      <button style={{ ...S.btn, padding:"3px 8px", fontSize:11 }} onClick={e=>{e.stopPropagation();saveEditMetric(m.date);}}>✓</button>
                      <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14, padding:"2px 6px" }} onClick={e=>{e.stopPropagation();setEditingMetric(null);}}>✕</button>
                    </div>
                  </>
                ) : (
                  <>
                    <span>{m.weight??"—"} lbs {delta!=null&&<span style={{ fontSize:10, color:Number(delta)<=0?T.green:T.red }}>{Number(delta)>0?"+":""}{delta}</span>}</span>
                    <span style={{ color:T.muted }}>{m.bodyFat!=null?m.bodyFat+"%":"—"}</span>
                    <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14, padding:"2px 6px" }} onClick={e=>{e.stopPropagation();if(window.confirm("Delete this entry?")){if(!demoMode)Storage.deleteMetric(userId,m.date).then(()=>onMetricUpsert());else onMetricUpsert({date:m.date,_delete:true});}}} title="Delete">×</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// BODY TAB
// ─────────────────────────────────────────────────────────────────────────────
function BodyTab({ metrics, nutrition, rmr, userId, onRmrSave, onMetricUpsert, userProfile, calTarget=calTarget, proteinTarget=proteinTarget }) {
  const today = new Date().toISOString().slice(0,10);
  const [bodySection, setBodySection] = useState("weight"); // "weight" | "dexa" | "rmr"

  // Weight check-in form (simple)
  const [wForm, setWForm] = useState({ date:today, weight:"", bodyFat:"" });
  const [wSaving, setWSaving] = useState(false);

  // DEXA form
  const [dexaForm, setDexaForm] = useState({ date:today, weight:"", bodyFat:"", leanMass:"", fatMass:"", visceralFat:"", boneDensity:"", skeletalMass:"" });
  const [dexaSaving, setDexaSaving] = useState(false);

  // RMR form
  const [rmrForm, setRmrForm] = useState({ date:today, rmr:"", rhr:"", rer:"", tdee:"" });
  const [rmrSaving, setRmrSaving] = useState(false);

  const weightData = metrics.filter(m=>m.weight).map(m=>({ x:m.date, y:m.weight }));
  const avgCal = sevenDayAvg(nutrition,"calories");
  const avgPro = sevenDayAvg(nutrition,"protein");

  async function saveWeight() {
    if (!wForm.weight) return;
    setWSaving(true);
    try {
      await onMetricUpsert({ date:wForm.date, weight:Number(wForm.weight), bodyFat:wForm.bodyFat?Number(wForm.bodyFat):null });
      setWForm({ date:today, weight:"", bodyFat:"" });
    } finally { setWSaving(false); }
  }

  async function saveDEXA() {
    if (!dexaForm.date) return;
    setDexaSaving(true);
    try {
      await onMetricUpsert({
        date: dexaForm.date,
        weight: dexaForm.weight ? Number(dexaForm.weight) : null,
        bodyFat: dexaForm.bodyFat ? Number(dexaForm.bodyFat) : null,
        leanMass: dexaForm.leanMass ? Number(dexaForm.leanMass) : null,
        fatMass: dexaForm.fatMass ? Number(dexaForm.fatMass) : null,
        visceralFat: dexaForm.visceralFat ? Number(dexaForm.visceralFat) : null,
        skeletalMass: dexaForm.skeletalMass ? Number(dexaForm.skeletalMass) : null,
      });
      setDexaForm({ date:today, weight:"", bodyFat:"", leanMass:"", fatMass:"", visceralFat:"", boneDensity:"", skeletalMass:"" });
    } finally { setDexaSaving(false); }
  }

  async function saveRMR() {
    if (!rmrForm.rmr) return;
    setRmrSaving(true);
    try {
      const updated = [...(rmr||[]).filter(r=>r.date!==rmrForm.date), { date:rmrForm.date, rmr:Number(rmrForm.rmr), rhr:rmrForm.rhr?Number(rmrForm.rhr):null, rer:rmrForm.rer?Number(rmrForm.rer):null, tdee:rmrForm.tdee?Number(rmrForm.tdee):null }];
      updated.sort((a,b)=>a.date.localeCompare(b.date));
      await onRmrSave(updated);
      setRmrForm({ date:today, rmr:"", rhr:"", rer:"", tdee:"" });
    } finally { setRmrSaving(false); }
  }

  // DEXA history — only entries with leanMass
  const dexaEntries = [...metrics].filter(m=>m.leanMass||m.visceralFat||m.skeletalMass).sort((a,b)=>b.date.localeCompare(a.date));

  const inp = (val, onChange, placeholder, type="number") => (
    <input style={{ ...S.input, marginBottom:0 }} type={type} placeholder={placeholder} value={val} step="any"
      onChange={e=>onChange(e.target.value)} />
  );

  const TAB_SECTIONS = [
    { id:"weight", label:"Weight Check-in" },
    { id:"dexa",   label:"DEXA Scan" },
    { id:"rmr",    label:"RMR Test" },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* ── Log Entry Card ── */}
      <div style={S.card}>
        <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Log Entry</div>
        <div style={{ display:"flex", gap:6, marginBottom:16 }}>
          {TAB_SECTIONS.map(s => (
            <button key={s.id} onClick={()=>setBodySection(s.id)}
              style={{ ...S.btnSm, background:bodySection===s.id?T.accent+"22":T.border, color:bodySection===s.id?T.accent:T.muted, border:`1px solid ${bodySection===s.id?T.accent+"55":T.border}` }}>
              {s.label}
            </button>
          ))}
        </div>

        {bodySection === "weight" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
              <div><label style={S.label}>Date</label>{inp(wForm.date, v=>setWForm(f=>({...f,date:v})), "Date", "date")}</div>
              <div><label style={S.label}>Weight (lbs)</label>{inp(wForm.weight, v=>setWForm(f=>({...f,weight:v})), "e.g. 204.5")}</div>
              <div><label style={S.label}>Body Fat %</label>{inp(wForm.bodyFat, v=>setWForm(f=>({...f,bodyFat:v})), "optional")}</div>
            </div>
            <button style={{ ...S.btn, marginTop:12 }} onClick={saveWeight} disabled={wSaving||!wForm.weight}>{wSaving?"Saving…":"Save Check-in"}</button>
          </div>
        )}

        {bodySection === "dexa" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              <div><label style={S.label}>Date</label>{inp(dexaForm.date, v=>setDexaForm(f=>({...f,date:v})), "Date", "date")}</div>
              <div><label style={S.label}>Weight (lbs)</label>{inp(dexaForm.weight, v=>setDexaForm(f=>({...f,weight:v})), "e.g. 208.2")}</div>
              <div><label style={S.label}>Body Fat %</label>{inp(dexaForm.bodyFat, v=>setDexaForm(f=>({...f,bodyFat:v})), "e.g. 43.7")}</div>
              <div><label style={S.label}>Lean Mass (lbs)</label>{inp(dexaForm.leanMass, v=>setDexaForm(f=>({...f,leanMass:v})), "e.g. 111.4")}</div>
              <div><label style={S.label}>Fat Mass (lbs)</label>{inp(dexaForm.fatMass, v=>setDexaForm(f=>({...f,fatMass:v})), "e.g. 92")}</div>
              <div><label style={S.label}>Visceral Fat (lbs)</label>{inp(dexaForm.visceralFat, v=>setDexaForm(f=>({...f,visceralFat:v})), "e.g. 2.53")}</div>
              <div><label style={S.label}>Skeletal Mass (lbs)</label>{inp(dexaForm.skeletalMass, v=>setDexaForm(f=>({...f,skeletalMass:v})), "e.g. 5.9")}</div>
              <div><label style={S.label}>Bone Density (g/cm²)</label>{inp(dexaForm.boneDensity, v=>setDexaForm(f=>({...f,boneDensity:v})), "e.g. 1.382")}</div>
            </div>
            <button style={{ ...S.btn, marginTop:4 }} onClick={saveDEXA} disabled={dexaSaving}>{dexaSaving?"Saving…":"Save DEXA Entry"}</button>
          </div>
        )}

        {bodySection === "rmr" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              <div><label style={S.label}>Date</label>{inp(rmrForm.date, v=>setRmrForm(f=>({...f,date:v})), "Date", "date")}</div>
              <div><label style={S.label}>RMR (kcal)</label>{inp(rmrForm.rmr, v=>setRmrForm(f=>({...f,rmr:v})), "e.g. 1536")}</div>
              <div><label style={S.label}>RHR (bpm)</label>{inp(rmrForm.rhr, v=>setRmrForm(f=>({...f,rhr:v})), "e.g. 72")}</div>
              <div><label style={S.label}>RER</label>{inp(rmrForm.rer, v=>setRmrForm(f=>({...f,rer:v})), "e.g. 0.78")}</div>
              <div style={{ gridColumn:"1/-1" }}><label style={S.label}>TDEE (kcal, measured)</label>{inp(rmrForm.tdee, v=>setRmrForm(f=>({...f,tdee:v})), "e.g. 2381")}</div>
            </div>
            <button style={{ ...S.btn, marginTop:4 }} onClick={saveRMR} disabled={rmrSaving||!rmrForm.rmr}>{rmrSaving?"Saving…":"Save RMR Entry"}</button>
            {(rmr||[]).length > 0 && (
              <div style={{ marginTop:16 }}>
                <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>RMR History</div>
                {[...(rmr||[])].reverse().map((r,i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr", gap:6, padding:"8px 0", borderBottom:`1px solid ${T.border}`, fontSize:11 }}>
                    <span style={{ color:T.muted }}>{r.date}</span>
                    <span>{r.rmr} kcal</span>
                    <span style={{ color:T.dim }}>RHR {r.rhr??'—'}</span>
                    <span style={{ color:T.dim }}>RER {r.rer??'—'}</span>
                    <span style={{ color:T.accent }}>TDEE {r.tdee??'—'}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── Charts ── */}
      <div style={{ ...S.grid2, marginBottom:0 }}>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Weight Trend</div>
            {weightData.length>=2 && <div style={{ fontSize:10, color:T.dim }}>{weightData[0].x} → {weightData[weightData.length-1].x}</div>}
          </div>
          <MiniChart data={weightData} color={T.accent} />
          {weightData.length>=2 && (() => {
            const delta = (weightData[weightData.length-1].y - weightData[0].y).toFixed(1);
            return <div style={{ fontSize:11, color:Number(delta)<=0?T.green:T.red, marginTop:6 }}>{Number(delta)>0?"+":""}{delta} lbs over {weightData.length} check-ins</div>;
          })()}
        </div>
        <div style={S.card}>
          {(() => {
            const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
            const recentN = (nutrition||[]).filter(n=>new Date(n.date)>=sevenDaysAgo);
            const dates = recentN.map(n=>n.date).sort();
            const rangeLabel = dates.length>=2 ? dates[0]+" \u2192 "+dates[dates.length-1] : dates.length===1 ? dates[0] : null;
            return (
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:12 }}>
                <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Nutrition Targets</div>
                <div style={{ fontSize:10, color:T.dim }}>{recentN.length > 0 ? recentN.length+" day avg" : "no data"}{rangeLabel ? " \xb7 "+rangeLabel : ""}</div>
              </div>
            );
          })()}
          <div style={{ marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontSize:12 }}>Calories</span>
              <span style={{ fontSize:12, color:avgCal!=null?(avgCal<=calTarget?T.green:T.red):T.dim }}>{avgCal!=null?avgCal+" / "+calTarget:"No data"}</span>
            </div>
            <ProgressBar value={avgCal||0} max={calTarget*1.3} color={avgCal&&avgCal<=calTarget?T.green:T.red} />
          </div>
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <span style={{ fontSize:12 }}>Protein</span>
              <span style={{ fontSize:12, color:avgPro!=null?(avgPro>=proteinTarget?T.green:T.amber):T.dim }}>{avgPro!=null?avgPro+"g / "+proteinTarget+"g":"No data"}</span>
            </div>
            <ProgressBar value={avgPro||0} max={220} color={avgPro&&avgPro>=proteinTarget?T.green:T.amber} />
          </div>
        </div>
      </div>

      {/* ── DEXA History ── */}
      {dexaEntries.length > 0 && (() => {
        const sorted = [...dexaEntries].sort((a,b)=>a.date.localeCompare(b.date));
        const leanData = sorted.filter(m=>m.leanMass!=null).map(m=>({ x:m.date, y:m.leanMass }));

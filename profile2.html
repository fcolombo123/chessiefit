function roundWarmup(w) { return Math.ceil(w / 5) * 5; }

function getWarmupSets(exercise, workingWeight, savedWarmups) {
  const w = workingWeight || 0;
  if (!w) return [];

  // Use saved overrides if present
  if (savedWarmups && savedWarmups.length > 0) {
    return savedWarmups.map(s => ({
      label: s.label,
      weight: s.weightType === "pct" ? roundWarmup(w * s.weightVal / 100) : s.weightVal,
      reps: s.reps,
      rest: s.rest,
    }));
  }

  if (WARMUP_HEAVY.includes(exercise)) {
    const isDeadlift = exercise === "Trap Bar Deadlift";
    if (isDeadlift) return [
      { weight: roundWarmup(w * 0.65), reps: 8, rest: 90, label: "Warmup 1" },
      { weight: roundWarmup(w * 0.80), reps: 5, rest: 120, label: "Warmup 2" },
    ];
    return [
      { weight: 45, reps: 10, rest: 60, label: "Bar warmup" },
      { weight: roundWarmup(w * 0.60), reps: 8, rest: 90, label: "Warmup 2" },
      { weight: roundWarmup(w * 0.80), reps: 5, rest: 120, label: "Warmup 3" },
    ];
  }
  if (WARMUP_MODERATE.includes(exercise)) {
    const sets = [{ weight: roundWarmup(w * 0.55), reps: 10, rest: 60, label: "Warmup 1" }];
    if (w >= 80) sets.push({ weight: roundWarmup(w * 0.75), reps: 8, rest: 90, label: "Warmup 2" });
    return sets;
  }
  if (WARMUP_LIGHT.includes(exercise)) {
    const isHipThrust = exercise === "Hip Thrusts";
    return [{ weight: isHipThrust ? 40 : 0, reps: isHipThrust ? 12 : 8, rest: 60, label: isHipThrust ? "Bar warmup" : "Bodyweight" }];
  }
  return [];
}

function formatRest(secs) {
  if (secs < 60) return `${secs}s`;
  const m = Math.floor(secs/60), s = secs%60;
  return s ? `${m}m ${s}s` : `${m}m`;
}

function calcAge(birthday) {
  if (!birthday) return null;
  const today = new Date(); const dob = new Date(birthday + "T12:00:00");
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}
function weekStartDate(week) {
  const d = new Date(WEEK1_START);
  d.setDate(d.getDate() + (week - 1) * 7);
  return d.toISOString().slice(0, 10);
}

function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; }

}

function calcBMI(weightLbs, heightIn) {
  if (!weightLbs || !heightIn) return null;
  return ((weightLbs / (heightIn * heightIn)) * 703).toFixed(1);
}
function calcRMR_KatchMcArdle(leanMassLbs) {
  if (!leanMassLbs) return null;
  const leanKg = leanMassLbs * 0.453592;
  return Math.round(370 + 21.6 * leanKg);
}
function calcRMR_MifflinStJeor(weightLbs, heightIn, age, sex) {
  if (!weightLbs || !heightIn) return null;
  const weightKg = weightLbs * 0.453592;
  const heightCm = heightIn * 2.54;
  const base = (10 * weightKg) + (6.25 * heightCm) - (5 * (age||30));
  return Math.round(sex === "female" ? base - 161 : base + 5);
}
function bmiCategory(bmi) {
  const b = parseFloat(bmi);
  if (b < 18.5) return { label:"Underweight", color:"#60a5fa" };
  if (b < 25)   return { label:"Normal", color:"#22c55e" };
  if (b < 30)   return { label:"Overweight", color:"#f59e0b" };
  return { label:"Obese", color:"#ef4444" };
}
function bfCategory(bf) {
  const b = parseFloat(bf);
  if (b >= 40)  return { label:"🥩 Wagyu",  color:"#ef4444" };
  if (b >= 35)  return { label:"🥩 Prime",  color:"#f97316" };
  if (b >= 30)  return { label:"🥩 Choice", color:"#f59e0b" };
  if (b >= 25)  return { label:"🥩 Select", color:"#84cc16" };
  return null;
}
function e1rm(w,r) { return r===1 ? w : w*(1+r/30); }
function avgE1rm(sets) { const v=sets.map(s=>e1rm(s.weight,s.reps)); return v.reduce((a,b)=>a+b,0)/v.length; }
function isDeloadWeek(w) { return w%6===0; }
function getExHistory(workouts, ex) { return workouts.filter(w=>w.exercise===ex).sort((a,b)=>a.week-b.week); }
function sevenDayAvg(entries, field) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7);
  const r = entries.filter(e=>new Date(e.date)>=cutoff && e[field]!=null);
  if (!r.length) return null;
  return Math.round(r.reduce((a,e)=>a+e[field],0)/r.length);
}

function getSuggestion(history, isDeload, exercise, repMinOverride, repMaxOverride, incrementOverride) {
  const sorted = [...history].sort((a,b)=>a.week-b.week);
  if (!sorted.length) return null;
  const recent = sorted[sorted.length-1];
  const twoBack = sorted.length>=2 ? sorted[sorted.length-2] : null;
  const [repMin, repMax] = [
    repMinOverride || (REP_SCHEMES[exercise]||[6,8])[0],
    repMaxOverride || (REP_SCHEMES[exercise]||[6,8])[1],
  ];
  const lastSets = recent.sets;
  const lastWeight = lastSets[lastSets.length-1].weight;
  const workingSets = lastSets.filter(s=>s.weight===lastWeight);
  const totalRepsRecent = workingSets.reduce((a,s)=>a+s.reps,0);
  const sameWeight = twoBack && lastWeight===twoBack.sets[twoBack.sets.length-1].weight;
  const totalRepsTwoBack = twoBack
    ? twoBack.sets.filter(s=>s.weight===twoBack.sets[twoBack.sets.length-1].weight).reduce((a,s)=>a+s.reps,0)
    : null;
  const isStalling = sameWeight && totalRepsTwoBack!=null && totalRepsRecent<totalRepsTwoBack;
  const allHitTop = workingSets.every(s=>s.reps>=repMax);
  const anyBelowBottom = workingSets.some(s=>s.reps<repMin);
  const intensity = recent.intensity || "medium";
  let suggestedWeight = lastWeight, note="";
  if (isDeload) {
    suggestedWeight = Math.round(lastWeight*0.6/2.5)*2.5;
    note="🔄 Deload — drop to 60%, focus on form.";
  } else if (isStalling) {
    suggestedWeight = Math.round(lastWeight*0.9/2.5)*2.5;
    note="⚠️ Stall detected. Back off 10%, rebuild.";
  } else if (anyBelowBottom) {
    suggestedWeight = Math.round(lastWeight*0.9/2.5)*2.5;
    note=`⚠️ Reps dropped below ${repMin}. Drop weight.`;
  } else if (allHitTop) {
    if (intensity === "very hard") {
      suggestedWeight = lastWeight;
      note=`⚠️ Hit ${repMax} reps but felt very hard — hold weight and consolidate.`;
    } else {
      const inc = incrementOverride != null ? incrementOverride : (lastWeight>=100?5:2.5);
      suggestedWeight = lastWeight+inc;
      note = intensity === "easy"
        ? `✅ All sets hit ${repMax} reps and felt easy. Add ${inc}lbs — could push harder next time.`
        : `✅ All sets hit ${repMax}. Add ${inc}lbs.`;
    }
  } else {
    const missed = workingSets.filter(s=>s.reps<repMax).length;
    const prog = totalRepsTwoBack!=null?` (${totalRepsTwoBack}→${totalRepsRecent} total reps)`:"";
    note=`📈 ${missed} set${missed>1?"s":""} below ${repMax}. Hold weight${prog}.`;
  }
  return { suggestedWeight, note, isStalling, repMin, repMax, basedOnWeek:recent.week, intensity };
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding:20, color:"#ff6b6b", fontFamily:"monospace", fontSize:12, background:"#1a1a1a", minHeight:"100vh" }}>
          <div style={{ fontSize:16, marginBottom:12 }}>⚠️ Render Error</div>
          <pre style={{ whiteSpace:"pre-wrap", wordBreak:"break-all" }}>{String(this.state.error)}</pre>
          <pre style={{ whiteSpace:"pre-wrap", wordBreak:"break-all", color:"#888", marginTop:12 }}>{this.state.error?.stack}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

function MiniChart({ data, color }) {
  if (data.length < 2) return <span style={{ color:T.dim, fontSize:11 }}>Not enough data</span>;
  const AX=32, H=70, pad=10, VW=280;
  const TW = VW + AX;
  const vals = data.map(d=>d.y);
  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const range = maxV-minV || 1;
  const mid = Math.round((minV+maxV)/2);
  const xOf = (i) => AX + pad + (i/(data.length-1))*(VW-pad*2);
  const yOf = (v) => H-pad - ((v-minV)/range)*(H-pad*2);
  const pts = data.map((d,i) => xOf(i)+","+yOf(d.y)).join(" ");
  const first = data[0]; const last = data[data.length-1];
  const fmtDate = (s) => { if(!s) return ""; const d=new Date(s+"T12:00:00"); return (d.getMonth()+1)+"/"+(d.getDate()); };
  return (
    <svg viewBox={"0 0 "+TW+" "+(H+18)} width="100%" style={{ display:"block" }}>
      {/* Y axis */}
      <line x1={AX} y1={pad} x2={AX} y2={H-pad} stroke={T.border} strokeWidth="1" />
      <text x={AX-4} y={yOf(maxV)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{maxV}</text>
      <text x={AX-4} y={yOf(minV)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{minV}</text>
      <line x1={AX-3} y1={yOf(maxV)} x2={AX} y2={yOf(maxV)} stroke={T.dim} strokeWidth="1" />
      <line x1={AX-3} y1={yOf(minV)} x2={AX} y2={yOf(minV)} stroke={T.dim} strokeWidth="1" />
      {Math.abs(yOf(mid)-yOf(maxV)) > 14 && Math.abs(yOf(mid)-yOf(minV)) > 14 && [
        <text key="mt" x={AX-4} y={yOf(mid)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{mid}</text>,
        <line key="ml" x1={AX-3} y1={yOf(mid)} x2={AX} y2={yOf(mid)} stroke={T.dim} strokeWidth="1" />
      ]}
      {/* X axis date labels */}
      <text x={xOf(0)}            y={H+14} textAnchor="start" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{fmtDate(first.x)}</text>
      <text x={xOf(data.length-1)} y={H+14} textAnchor="end"   fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{fmtDate(last.x)}</text>
      {/* Line + dots */}
      <polyline fill="none" stroke={color||T.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={pts} />
      {data.map((d,i) => (
        <circle key={i} cx={xOf(i)} cy={yOf(d.y)} r="3" fill={color||T.accent} />
      ))}
    </svg>
  );
}

function SetsDisplay({ sets }) {

}

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [showPassword, setShowPassword] = useState(false);

  async function handleSubmit() {
    setError(""); setMessage(""); setLoading(true);
    try {
      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out. Check your internet connection.")), 8000));
      const authPromise = mode === "signin"
        ? Auth.signIn(email.trim(), password)
        : Auth.signUp(email.trim(), password);
      const result = await Promise.race([authPromise, timeoutPromise]);
      setLoading(false);
      if (result.error) { setError(result.error); return; }
      if (result.user) onAuth(result.user);
    } catch(e) {
      setLoading(false);
      setError(e.message || "Something went wrong. Try again.");
    }
  }

  async function handleForgotPassword() {
    if (!email.trim()) { setError("Enter your email above first."); return; }
    setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
      redirectTo: window.location.origin,
    });
    setLoading(false);
    if (error) setError(error.message);
    else setMessage("Password reset email sent — check your inbox.");
  }

  return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ ...S.card, width:380, padding:"36px 32px" }}>
        <div style={{ fontSize:22, fontWeight:700, color:T.accent, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4 }}>Health Journal</div>
        <div style={{ fontSize:11, color:T.muted, marginBottom:28, letterSpacing:"0.1em", textTransform:"uppercase" }}>Progressive Overload Tracker</div>
        <div style={{ marginBottom:14 }}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} autoFocus />
        </div>
        <div style={{ marginBottom:6 }}>
          <label style={S.label}>Password</label>
          <div style={{ position:"relative" }}>
            <input style={{ ...S.input, paddingRight:44 }} type={showPassword?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} />
            <span onClick={()=>setShowPassword(p=>!p)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", cursor:"pointer", fontSize:11, color:T.muted, userSelect:"none" }}>
              {showPassword?"Hide":"Show"}
            </span>
          </div>
        </div>
        {mode === "signin" && (
          <div style={{ textAlign:"right", marginBottom:16 }}>
            <span style={{ fontSize:11, color:T.accent, cursor:"pointer" }} onClick={handleForgotPassword}>Forgot password?</span>
          </div>
        )}
        {!message && <div style={{ marginBottom:16 }} />}
        {error && <div style={{ color:T.red, fontSize:12, marginBottom:14 }}>{error}</div>}
        {message && <div style={{ color:T.green, fontSize:12, marginBottom:14 }}>{message}</div>}
        <button style={{ ...S.btn, width:"100%", padding:"10px" }} onClick={handleSubmit} disabled={loading}>
          {loading ? "..." : mode==="signin" ? "Sign In" : "Create Account"}
        </button>
        <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:T.muted }}>
          {mode==="signin" ? "No account? " : "Already have one? "}
          <span style={{ color:T.accent, cursor:"pointer" }} onClick={()=>{setMode(mode==="signin"?"signup":"signin");setError("");setMessage("");}}>
            {mode==="signin" ? "Sign up" : "Sign in"}
          </span>
        </div>
      </div>
    </div>
  );
}

function MiniLineChart({ data, color, unit }) {
    const [hovered, setHovered] = React.useState(null);
    if (!data.length) return <div style={{ fontSize:11, color:T.dim, marginTop:8 }}>No data yet — log in Body tab.</div>;
    const vals = data.map(d=>d.value);
    const min = Math.min(...vals); const max = Math.max(...vals);
    const range = max - min || 1;
    const AX = 36; const W = 260; const H = 80; const pad = 8;
    const xOf = (i) => AX + pad + (i/(Math.max(data.length-1,1)))*(W-pad*2);
    const yOf = (v) => H - pad - ((v-min)/range)*(H-pad*2);
    const pts = data.map((d,i) => xOf(i)+","+yOf(d.value)).join(" ");
    const first = data[0]; const last = data[data.length-1];
    const change = last.value - first.value;
    const mid = Math.round((min+max)/2);
    const TOTAL_W = W + AX;
    return (
      <div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6 }}>
          <span style={{ fontSize:22, fontWeight:700, color:T.text }}>{last.value}<span style={{ fontSize:12, color:T.muted }}> {unit}</span></span>
          <span style={{ fontSize:11, color: change<=0?T.green:T.red }}>{change>0?"+":""}{change.toFixed(1)} {unit} total</span>
        </div>
        {hovered !== null && (
          <div style={{ fontSize:10, color:T.accent, marginBottom:4, minHeight:14 }}>
            {data[hovered].value}{unit} · {data[hovered].date}
          </div>
        )}
        {hovered === null && <div style={{ minHeight:14, marginBottom:4 }} />}
        <svg width="100%" viewBox={"0 0 "+TOTAL_W+" "+H} style={{ overflow:"visible", display:"block" }}
          onMouseLeave={()=>setHovered(null)}>
          <line x1={AX} y1={pad} x2={AX} y2={H-pad} stroke={T.border} strokeWidth="1" />
          <text x={AX-4} y={yOf(max)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{max}</text>
          <text x={AX-4} y={yOf(mid)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{mid}</text>
          <text x={AX-4} y={yOf(min)+4} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="Inter,sans-serif">{min}</text>
          <line x1={AX-3} y1={yOf(max)} x2={AX} y2={yOf(max)} stroke={T.dim} strokeWidth="1" />
          <line x1={AX-3} y1={yOf(mid)} x2={AX} y2={yOf(mid)} stroke={T.dim} strokeWidth="1" />
          <line x1={AX-3} y1={yOf(min)} x2={AX} y2={yOf(min)} stroke={T.dim} strokeWidth="1" />
          <polyline fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={pts} />
          {data.map((d,i) => (
            <g key={i} onMouseEnter={()=>setHovered(i)}>
              <circle cx={xOf(i)} cy={yOf(d.value)} r="8" fill="transparent" />
              <circle cx={xOf(i)} cy={yOf(d.value)} r={hovered===i?5:3} fill={color} />
            </g>
          ))}
        </svg>
        <div style={{ fontSize:10, color:T.dim, marginTop:4, paddingLeft:AX }}>{data.length} entries · {first.date} → {last.date}</div>
      </div>
    );
  }

function OverviewTab({ workouts, metrics, nutrition, currentWeek, cardio, rmr, userProfile, calTarget=CAL_TARGET, proteinTarget=PROTEIN_TARGET, activityMultiplier=1.6 }) {
  const latestMetric = [...metrics].sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0];
  const latestMetricWithBf = [...metrics].filter(m=>m.bodyFat!=null).sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0];
  const avgCal = sevenDayAvg(nutrition, "calories");
  const avgPro = sevenDayAvg(nutrition, "protein");
  const weeksUntilDeload = 6 - (currentWeek % 6);
  const sessionsByDay = DAYS.map(day => {
    const logged = workouts.filter(w=>w.week===currentWeek&&w.day===day);
    return { day, logged: logged.length > 0 };
  });
  const weekWorkouts = workouts.filter(w=>w.week===currentWeek);
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  const weekCardio = (cardio||[]).filter(c=>new Date(c.date)>=sevenDaysAgo);
  const CARDIO_TARGET = 4;

  const allExercises = [...new Set(workouts.map(w=>w.exercise))];
  const e1rmData = allExercises.filter(ex=>REP_SCHEMES[ex]&&REP_SCHEMES[ex][1]<=10).map(ex => {
    const hist = getExHistory(workouts, ex);
    if (!hist.length) return null;
    const last = hist[hist.length-1];
    const prev = hist.length>=2?hist[hist.length-2]:null;
    const rm = Math.round(avgE1rm(last.sets));
    const gain = prev ? rm - Math.round(avgE1rm(prev.sets)) : 0;
    return { ex, rm, gain };
  }).filter(Boolean).sort((a,b)=>b.rm-a.rm).slice(0,4);

  const weightData = metrics.filter(m=>m.weight).map(m=>({ date:m.date, value:m.weight })).sort((a,b)=>a.date.localeCompare(b.date));
  const bfData = metrics.filter(m=>m.bodyFat!=null).map(m=>({ date:m.date, value:m.bodyFat })).sort((a,b)=>a.date.localeCompare(b.date));

  // BMI
  const heightIn = userProfile?.heightIn;
  const bmi = latestMetric?.weight && heightIn ? calcBMI(latestMetric.weight, heightIn) : null;
  const bmiCat = bmi ? bmiCategory(bmi) : null;

  // RMR — measured or estimated
  const latestRmrEntry = (rmr||[]).slice(-1)[0];
  const latestDexa = [...metrics].filter(m=>m.leanMass).sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0];
  const estimatedRmr = latestDexa
    ? calcRMR_KatchMcArdle(latestDexa.leanMass)
    : (userProfile ? calcRMR_MifflinStJeor(latestMetric?.weight, userProfile.heightIn, calcAge(userProfile.birthday) ?? userProfile.age, userProfile.sex) : null);
  const displayRmr = latestRmrEntry?.rmr || estimatedRmr;
  const rmrSource = latestRmrEntry ? `Measured ${latestRmrEntry.date}` : latestDexa ? "Est. · Katch-McArdle" : "Est. · Mifflin-St Jeor";
  const tdee = displayRmr ? Math.round(displayRmr * activityMultiplier) : null;
  const deficit = tdee && avgCal ? tdee - avgCal : null;

  return (
    <div>
      {/* Row 1: Week + This Week */}
      <div style={{ ...S.grid2, marginBottom:16 }}>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>Current Week</div>
          <div style={S.big}>{currentWeek}</div>
          <div style={{ fontSize:11, color:isDeloadWeek(currentWeek)?T.green:T.muted, marginTop:4 }}>
            {isDeloadWeek(currentWeek) ? "🔄 Deload week" : `${weeksUntilDeload}w until deload`}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>This Week</div>
          <div style={{ fontSize:10, color:T.dim, marginBottom:4 }}>Lifting</div>
          <div style={{ display:"flex", gap:8, marginBottom:8 }}>
            {sessionsByDay.map(({day,logged}) => (
              <div key={day} title={day} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:logged?DAY_COLORS[day]:T.border }} />
                <div style={{ fontSize:9, color:T.dim }}>{day.split(" ")[1][0]}{day.split(" ")[0][0]}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize:10, color:T.dim, marginBottom:4 }}>Cardio <span style={{ color:weekCardio.length>=CARDIO_TARGET?T.green:T.accent }}>{weekCardio.length}/{CARDIO_TARGET}</span></div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {Array(Math.max(CARDIO_TARGET, weekCardio.length)).fill(null).map((_,i) => {
              const session = weekCardio[i];
              const isExtra = i >= CARDIO_TARGET;
              return (
                <div key={i} title={session?`${session.type} · ${session.duration}min`:"Not done"}
                  style={{ width:10, height:10, borderRadius:"50%",
                    background: session ? (isExtra ? T.green : T.accent) : T.border,
                    outline: isExtra ? `2px solid ${T.green}44` : "none" }} />
              );
            })}
          </div>
          <div style={{ fontSize:11, color:T.muted, marginTop:8 }}>{weekWorkouts.length} workouts · {weekCardio.length} cardio sessions</div>
        </div>
      </div>

      {/* Row 2: Body Weight + Body Fat charts */}
      <div style={{ ...S.grid2, marginBottom:16 }}>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Body Weight</div>
            {weightData.length>=2 && <div style={{ fontSize:10, color:T.dim }}>{weightData[0].date} → {weightData[weightData.length-1].date}</div>}
          </div>
          <MiniLineChart data={weightData} color={T.accent} unit="lbs" />
        </div>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>Body Fat %</div>
            {bfData.length>=2 && <div style={{ fontSize:10, color:T.dim }}>{bfData[0].date} → {bfData[bfData.length-1].date}</div>}
          </div>
          <MiniLineChart data={bfData} color={T.amber} unit="%" />
          {(() => {
            const latestBf = bfData.length ? bfData[bfData.length-1].value : null;
            const bfCat = latestBf != null ? bfCategory(latestBf) : null;
            return bfCat ? (
              <div style={{ marginTop:8 }}>
                <span style={{ fontSize:12, padding:"4px 12px", borderRadius:6, background:bfCat.color+"33", color:bfCat.color, fontWeight:700, border:`1px solid ${bfCat.color}88` }}>{bfCat.label}</span>
              </div>
            ) : <div style={{fontSize:10,color:"red"}}>bf:{latestBf} cat:{JSON.stringify(bfCat)}</div>;
          })()}
        </div>
      </div>

      {/* Row 3: BMI + RMR */}
      <div style={{ ...S.grid2, marginBottom:16 }}>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>BMI</div>
          {bmi ? (
            <>
              <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                <span style={{ fontSize:28, fontWeight:700, color:bmiCat.color }}>{bmi}</span>
                <span style={{ fontSize:12, padding:"2px 8px", borderRadius:6, background:bmiCat.color+"22", color:bmiCat.color, fontWeight:600 }}>{bmiCat.label}</span>
              </div>
              <div style={{ fontSize:11, color:T.muted, marginTop:6 }}>{latestMetric.weight} lbs · {Math.floor(heightIn/12)}'{heightIn%12}"</div>
            </>
          ) : <div style={{ fontSize:11, color:T.dim, marginTop:8 }}>Set height in Settings to calculate.</div>}
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>RMR / TDEE</div>
          {displayRmr ? (
            <>
              <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:2 }}>
                <span style={{ fontSize:22, fontWeight:700, color:T.text }}>{displayRmr}</span>
                <span style={{ fontSize:12, color:T.muted }}>kcal RMR</span>
              </div>
              {tdee && <div style={{ fontSize:13, color:T.accent, fontWeight:600, marginBottom:4 }}>TDEE ~{tdee} kcal</div>}
              {deficit!=null && (
                <div style={{ fontSize:11, color:deficit>=0?T.green:T.red }}>
                  {deficit>=0 ? `${deficit} kcal deficit` : `${Math.abs(deficit)} kcal surplus`}
                </div>
              )}
              <div style={{ fontSize:10, color:T.dim, marginTop:6 }}>{rmrSource}</div>
            </>
          ) : <div style={{ fontSize:11, color:T.dim, marginTop:8 }}>Log an RMR test or complete onboarding.</div>}
        </div>
      </div>

      {/* Row 4: Calories + Protein */}
      {(() => {
        const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
        const recentN = (nutrition||[]).filter(n=>new Date(n.date)>=sevenDaysAgo);
        const ndates = recentN.map(n=>n.date).sort();
        const nRange = ndates.length>=2 ? ndates[0]+" → "+ndates[ndates.length-1] : ndates[0]||null;
        return (
      <div style={{ ...S.grid2, marginBottom:16 }}>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:12 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>7-Day Avg Calories</div>
            {nRange && <div style={{ fontSize:10, color:T.dim }}>{nRange}</div>}
          </div>
          {avgCal!=null ? (
            <>
              <div style={S.big}>{avgCal}<span style={{ fontSize:14, color:T.muted }}> kcal</span></div>
              <div style={{ fontSize:11, color:avgCal<=calTarget?T.green:T.red, marginTop:4 }}>
                Target: {calTarget} · {avgCal<=calTarget?`✓ ${calTarget-avgCal} under`:`+${avgCal-calTarget} over`}
              </div>
              <div style={{ marginTop:10 }}><ProgressBar value={avgCal} max={calTarget*1.3} color={avgCal<=calTarget?T.green:T.red} /></div>
            </>
          ) : <div style={{ fontSize:12, color:T.dim, marginTop:8 }}>No nutrition logged yet — add entries in the Log tab.</div>}
        </div>
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:12 }}><div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em" }}>7-Day Avg Protein</div>{nRange && <div style={{ fontSize:10, color:T.dim }}>{nRange}</div>}</div>
          {avgPro!=null ? (
            <>
              <div style={S.big}>{avgPro}<span style={{ fontSize:14, color:T.muted }}> g</span></div>
              <div style={{ fontSize:11, color:avgPro>=proteinTarget?T.green:T.amber, marginTop:4 }}>
                Target: {proteinTarget}g · {avgPro>=proteinTarget?`✓ hitting target`:`${proteinTarget-avgPro}g short`}
              </div>
              <div style={{ marginTop:10 }}><ProgressBar value={avgPro} max={220} color={avgPro>=proteinTarget?T.green:T.amber} /></div>
            </>
          ) : <div style={{ fontSize:12, color:T.dim, marginTop:8 }}>No nutrition logged yet — add entries in the Log tab.</div>}
        </div>
      </div>
        );
      })()}

      {/* Row 5: Top Lifts */}
      {e1rmData.length > 0 && (
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Top Lifts — Estimated 1RM</div>
          <div style={S.grid2}>
            {e1rmData.map(({ex,rm,gain}) => (
              <div key={ex}>
                <div style={{ fontSize:11, color:T.muted, marginBottom:4 }}>{ex}</div>
                <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:22, fontWeight:700, color:T.text }}>{rm}</span>
                  <span style={{ fontSize:11, color:T.muted }}>lbs</span>
                  <span style={{ fontSize:11, color:gain>=0?T.green:T.red }}>{gain>=0?"+":""}{gain}</span>
                </div>
                <ProgressBar value={rm} max={300} color={T.accent} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

              color: intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
              border:`1px solid ${intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
            }}>{level}</button>

      <input style={{ ...S.input, marginBottom:10 }} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Notes (optional)" />
      <div style={{ display:"flex", gap:8 }}>

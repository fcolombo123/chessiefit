const DAY_EXERCISE_ORDER = {
  "Upper Push": ["Barbell Bench Press","Seated DB OHP","Incline DB Press (Push)","Cable Flyes","Lateral Raises","Tricep Pushdowns","Cable Rows Wide","Face Pulls"],
  "Lower A":    ["Barbell Back Squat","Leg Press","Romanian Deadlifts","Leg Curls","Leg Extensions","Goblet Squats","Hanging Leg Raises"],
  "Upper Pull": ["Lat Pulldowns","DB Rows","Cable Rows Close","Cable Rows Wide","Incline DB Press (Pull)","OH Tricep Extension","Barbell Curls","Hammer Curls","Face Pulls"],
  "Lower B":    ["Trap Bar Deadlift","Bulgarian Split Squats","Leg Press","Leg Curls","Hip Thrusts","Plank"],
};

function ExerciseMiniCard({ exercise, workouts, chartMode="weight" }) {
  const hist = getExHistory(workouts, exercise);
  if (!hist.length) return null;
  const weightData = hist.map(h => ({ x: h.week, y: Math.max(...h.sets.map(s=>s.weight)) }));
  const e1rmData = hist.map(h => ({ x: h.week, y: Math.round(avgE1rm(h.sets)) }));
  const chartData = chartMode === "e1rm" ? e1rmData : weightData;
  const latest = chartData[chartData.length - 1];
  const first = chartData[0];
  const gain = latest.y - first.y;
  const lastSets = hist[hist.length - 1].sets;
  const lastWeight = Math.max(...lastSets.map(s=>s.weight));

  return (
    <div style={{ ...S.card, padding:"12px 14px" }}>
      <div style={{ fontSize:11, fontWeight:600, color:T.text, marginBottom:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{exercise}</div>
      <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:8 }}>
        <span style={{ fontSize:18, fontWeight:700, color:T.accent }}>{lastWeight}</span>
        <span style={{ fontSize:10, color:T.muted }}>lbs</span>
        {chartData.length >= 2 && (
          <span style={{ fontSize:10, color:gain>=0?T.green:T.red, marginLeft:2 }}>{gain>=0?"+":""}{gain} {chartMode==="e1rm"?"e1RM":"lbs"}</span>
        )}
      </div>
      <MiniChart data={chartData} color={T.accent} />
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
        <span style={{ fontSize:9, color:T.dim }}>W{first.x}</span>
        <span style={{ fontSize:9, color:T.dim }}>{chartMode==="e1rm"?"e1RM":"weight"}</span>
        <span style={{ fontSize:9, color:T.dim }}>W{latest.x}</span>
      </div>
    </div>
  );
}

function ProgressTab({ workouts }) {
  const [view, setView] = useState("by-day");
  const [activeDay, setActiveDay] = useState(DAYS[0]);
  const [activeExercise, setActiveExercise] = useState("");
  const [chartMode, setChartMode] = useState("weight");

  const allExercises = useMemo(() => {
    const all = [...new Set(workouts.map(w => w.exercise))];
    // sort by day order
    const flat = DAYS.flatMap(d => DAY_EXERCISE_ORDER[d] || []);
    return [...all].sort((a, b) => {
      const ai = flat.indexOf(a), bi = flat.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }, [workouts]);

  useEffect(() => { if (!activeExercise && allExercises.length) setActiveExercise(allExercises[0]); }, [allExercises]);

  function orderedForDay(day) {
    const order = DAY_EXERCISE_ORDER[day] || [];
    const logged = [...new Set(workouts.filter(w => w.day === day).map(w => w.exercise))];
    return [...order.filter(e => logged.includes(e)), ...logged.filter(e => !order.includes(e))];
  }

  const ViewToggle = () => (
    <div style={{ display:"flex", gap:4, marginBottom:20, flexWrap:"wrap", alignItems:"center" }}>
      {[["by-day","By Day"],["all","All Exercises"],["single","By Exercise"]].map(([v,label]) => (
        <button key={v} onClick={() => setView(v)}
          style={{ ...S.btnSm, background:view===v?T.accent+"22":T.border, color:view===v?T.accent:T.muted, border:`1px solid ${view===v?T.accent+"55":T.border}` }}>
          {label}
        </button>
      ))}
      <div style={{ marginLeft:"auto", display:"flex", gap:4 }}>
        {[["weight","Weight"],["e1rm","e1RM"]].map(([m,label]) => (
          <button key={m} onClick={() => setChartMode(m)}
            style={{ ...S.btnSm, background:chartMode===m?T.accent+"22":T.border, color:chartMode===m?T.accent:T.muted, border:`1px solid ${chartMode===m?T.accent+"55":T.border}` }}>
            {label}
          </button>
        ))}
      </div>
    </div>
  );

  // ── View 1: By Day ──────────────────────────────────────────────────────────
  if (view === "by-day") return (
    <div>
      <ViewToggle />
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {DAYS.map(d => (
          <button key={d} onClick={() => setActiveDay(d)}
            style={{ ...S.btnSm, background:activeDay===d?DAY_COLORS[d]+"22":T.border, color:activeDay===d?DAY_COLORS[d]:T.muted, border:`1px solid ${activeDay===d?DAY_COLORS[d]+"55":T.border}` }}>
            {d}
          </button>
        ))}
      </div>
      {orderedForDay(activeDay).length === 0
        ? <div style={{ ...S.card, color:T.dim, fontSize:12 }}>No workouts logged for {activeDay} yet.</div>
        : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:12 }}>
            {orderedForDay(activeDay).map(ex => <ExerciseMiniCard key={ex} exercise={ex} workouts={workouts} chartMode={chartMode} />)}
          </div>
      }
    </div>
  );

  // ── View 2: All Exercises ───────────────────────────────────────────────────
  if (view === "all") return (
    <div>
      <ViewToggle />
      {DAYS.map(day => {
        const exercises = orderedForDay(day);
        if (!exercises.length) return null;
        return (
          <div key={day} style={{ marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <div style={{ width:3, height:16, background:DAY_COLORS[day], borderRadius:2 }} />
              <div style={{ fontSize:11, fontWeight:700, color:DAY_COLORS[day], textTransform:"uppercase", letterSpacing:"0.1em" }}>{day}</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:10 }}>
              {exercises.map(ex => <ExerciseMiniCard key={ex} exercise={ex} workouts={workouts} chartMode={chartMode} />)}
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── View 3: Single Exercise ─────────────────────────────────────────────────
  if (view === "single") {
    const hist = getExHistory(workouts, activeExercise);
    const weightData = hist.map(h => ({ x: h.week, y: Math.max(...h.sets.map(s=>s.weight)) }));
    const e1rmData = hist.map(h => ({ x: h.week, y: Math.round(avgE1rm(h.sets)) }));
    const chartData = chartMode === "e1rm" ? e1rmData : weightData;
    const gain = chartData.length >= 2 ? chartData[chartData.length-1].y - chartData[0].y : 0;
    const suggestion = getSuggestion(hist, false, activeExercise);
    const [repMin, repMax] = REP_SCHEMES[activeExercise] || [6,8];

    return (
      <div>
        <ViewToggle />
        <div style={{ marginBottom:16 }}>
          <label style={S.label}>Exercise</label>
          <select style={{ ...S.select, maxWidth:320 }} value={activeExercise} onChange={e => setActiveExercise(e.target.value)}>
            {allExercises.map(ex => <option key={ex}>{ex}</option>)}
          </select>
        </div>
        <div style={S.grid2}>
          <div style={S.card}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>{chartMode==="e1rm"?"e1RM Trend":"Weight Trend"}</div>
            <MiniChart data={chartData} color={T.accent} />
            {chartData.length >= 2 && (
              <div style={{ fontSize:11, color:gain>=0?T.green:T.red, marginTop:8 }}>
                {gain>=0?"+":""}{gain} lbs since W{chartData[0].x}
              </div>
            )}
          </div>
          <div style={S.card}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Rep Scheme</div>
            <div style={{ fontSize:28, fontWeight:700, color:T.accent }}>{repMin}–{repMax}</div>
            <div style={{ fontSize:11, color:T.muted, marginTop:4 }}>reps per set</div>
            {suggestion && (
              <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${T.border}` }}>
                <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Next Target</div>
                <div style={{ fontSize:22, fontWeight:700, color:T.text }}>{suggestion.suggestedWeight}<span style={{ fontSize:11, color:T.muted }}> lbs</span></div>
                <div style={{ fontSize:11, color:T.dim, marginTop:6, lineHeight:1.5 }}>{suggestion.note}</div>
              </div>
            )}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Session History</div>
          {hist.length === 0 && <div style={{ fontSize:12, color:T.dim }}>No data yet.</div>}
          {[...hist].reverse().map((h,i) => (
            <div key={i} style={{ padding:"10px 0", borderBottom:`1px solid ${T.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <div style={{ fontSize:12, fontWeight:600 }}>Week {h.week} <span style={{ color:T.dim, fontWeight:400 }}>— {h.day}</span></div>
                <span style={{ fontSize:11, color:T.accent, fontWeight:700 }}>e1RM: {Math.round(avgE1rm(h.sets))}</span>
              </div>
              <div style={{ fontSize:11, color:T.muted }}>
                {(() => {
                  const weights = h.sets.map(s => s.weight);
                  const uniform = weights.every(w => w === weights[0]);
                  if (uniform) return <span>{h.sets.map(s=>s.reps).join(", ")} reps @ {weights[0]}lbs</span>;
                  return h.sets.map((s,j) => <span key={j} style={{ marginRight:10 }}>{s.reps}×{s.weight}lbs</span>);
                })()}
              </div>
              {h.notes && <div style={{ fontSize:10, color:T.amber, marginTop:4 }}>⚠ {h.notes}</div>}
            </div>
          ))}
        </div>
      </div>
    );
  }
}

function WarmupEditor({ exName: exercise, exEntry, onUpdate }) {
  const defaultSets = getWarmupSets(exercise, 100); // use 100 as reference for % defaults
  const hasWarmups = [...WARMUP_HEAVY, ...WARMUP_MODERATE, ...WARMUP_LIGHT].includes(exercise);

  // Local state: array of {weightType:"pct"|"flat", weightVal:number, reps:number, rest:number, label:string}
  const [sets, setSets] = useState(() => {
    if (exEntry.warmups) return exEntry.warmups;
    if (!hasWarmups) return [];
    return defaultSets.map(s => ({
      label: s.label,
      weightType: s.weight === 0 ? "flat" : s.weight === 40 || s.weight === 45 ? "flat" : "pct",
      weightVal: s.weight === 0 ? 0 : s.weight === 40 ? 40 : s.weight === 45 ? 45 : Math.round(s.weight),
      reps: s.reps,
      rest: s.rest,
    }));
  });

  // Keep parent in sync whenever sets change
  useEffect(() => { onUpdate(sets); }, [sets]);

  function updateSet(i, field, val) {
    setSets(prev => { const n=[...prev]; n[i]={...n[i],[field]:val}; return n; });
  }
  function addSet() {
    setSets(prev => [...prev, { label:`Warmup ${prev.length+1}`, weightType:"pct", weightVal:50, reps:8, rest:60 }]);
  }
  function removeSet(i) {
    setSets(prev => prev.filter((_,j)=>j!==i));
  }

  if (!hasWarmups && sets.length === 0) return (
    <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:8, marginTop:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
        <span style={{ fontSize:10, color:T.dim, textTransform:"uppercase", letterSpacing:"0.1em" }}>Warmup Sets</span>
        <button style={S.btnSm} onClick={addSet}>+ Add Warmup</button>
      </div>
      <div style={{ fontSize:11, color:T.dim }}>No warmups — muscles warm from prior sets.</div>
    </div>
  );

  return (
    <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:8, marginTop:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <span style={{ fontSize:10, color:T.amber, textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700 }}>Warmup Sets</span>
        <button style={S.btnSm} onClick={addSet}>+ Add</button>
      </div>
      {sets.length === 0 && <div style={{ fontSize:11, color:T.dim, marginBottom:4 }}>No warmup sets.</div>}
      {sets.map((s, i) => (
        <div key={i} style={{ background:T.bg, borderRadius:6, padding:"8px 10px", marginBottom:6 }}>
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            <input style={{ ...S.input, width:80, padding:"3px 6px", fontSize:11 }} value={s.label}
              onChange={e=>updateSet(i,"label",e.target.value)} placeholder="Label" />

            {/* Weight toggle */}
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <button onClick={()=>updateSet(i,"weightType",s.weightType==="pct"?"flat":"pct")}
                style={{ ...S.btnSm, padding:"3px 8px", fontSize:10,
                  background: s.weightType==="pct" ? T.accent+"33" : T.border,
                  color: s.weightType==="pct" ? T.accent : T.muted }}>
                {s.weightType==="pct" ? "%" : "lbs"}
              </button>
              <input style={{ ...S.input, width:50, padding:"3px 6px", textAlign:"center", fontSize:12 }}
                type="number" min="0" step={s.weightType==="pct"?5:2.5}
                value={s.weightVal}
                onChange={e=>updateSet(i,"weightVal",Number(e.target.value))} />
              <span style={{ fontSize:10, color:T.dim }}>{s.weightType==="pct"?"%":"lbs"}</span>
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:10, color:T.dim }}>reps</span>
              <input style={{ ...S.input, width:44, padding:"3px 6px", textAlign:"center", fontSize:12 }}
                type="number" min="1" value={s.reps}
                onChange={e=>updateSet(i,"reps",Number(e.target.value))} />
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:10, color:T.dim }}>rest</span>
              <input style={{ ...S.input, width:50, padding:"3px 6px", textAlign:"center", fontSize:12 }}
                type="number" min="0" step="15" value={s.rest}
                onChange={e=>updateSet(i,"rest",Number(e.target.value))} />
              <span style={{ fontSize:10, color:T.dim }}>s</span>
            </div>

            <button style={{ background:"transparent", border:"none", color:T.red, cursor:"pointer", fontSize:14, marginLeft:"auto" }}
              onClick={()=>removeSet(i)}>×</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function SettingsTab({ darkMode, onToggleDark, user, onSignOut, profileUrl, program, userId, onProgramSave, userProfile, onProfileSave, demoMode=false }) {
  const [editProgram, setEditProgram] = useState(()=>JSON.parse(JSON.stringify(program)));
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  // Profile editing
  const toFt = (totalIn) => ({ ft: Math.floor((totalIn||0)/12), in: (totalIn||0)%12 });
  const ftIn = toFt(userProfile?.heightIn);
  const [profForm, setProfForm] = useState({ heightFt: ftIn.ft||"", heightIn: ftIn.in||"", birthday: userProfile?.birthday||"", sex: userProfile?.sex||"", displayName: userProfile?.displayName||"", calTarget: userProfile?.calTarget||"", proteinTarget: userProfile?.proteinTarget||"", week1Start: userProfile?.week1Start||"2026-02-11", activityMultiplier: userProfile?.activityMultiplier||"1.6" });
  const [profSaving, setProfSaving] = useState(false);
  const [profSaved, setProfSaved] = useState(false);

  async function saveProfile() {
    setProfSaving(true);
    const heightIn = (Number(profForm.heightFt)*12) + Number(profForm.heightIn||0);
    await onProfileSave({ ...(userProfile||{}), heightIn: heightIn||null, birthday: profForm.birthday||null, sex: profForm.sex||null, displayName: profForm.displayName||null, calTarget: profForm.calTarget?Number(profForm.calTarget):null, proteinTarget: profForm.proteinTarget?Number(profForm.proteinTarget):null, week1Start: profForm.week1Start||null, activityMultiplier: profForm.activityMultiplier?Number(profForm.activityMultiplier):null });
    setProfSaving(false);
    setProfSaved(true);
    setTimeout(()=>setProfSaved(false), 2000);
  }

  // (no sync effect — editProgram is initialized from program on mount only)

  function updateDayName(i, name) {
    setEditProgram(p=>{ const d=[...p.days]; d[i]={...d[i],name}; return {...p,days:d}; });
  }
  function updateExSets(dayIdx, exIdx, sets) {
    setEditProgram(p=>{ const d=[...p.days]; const exs=[...d[dayIdx].exercises];
      exs[exIdx]={...exs[exIdx], sets:Number(sets)||1}; d[dayIdx]={...d[dayIdx],exercises:exs}; return {...p,days:d}; });
  }
  function updateExReps(dayIdx, exIdx, field, val) {
    setEditProgram(p=>{ const d=[...p.days]; const exs=[...d[dayIdx].exercises];
      exs[exIdx]={...exs[exIdx], [field]:Number(val)||1}; d[dayIdx]={...d[dayIdx],exercises:exs}; return {...p,days:d}; });
  }
  function updateExIncrement(dayIdx, exIdx, val) {
    setEditProgram(p=>{ const d=[...p.days]; const exs=[...d[dayIdx].exercises];
      exs[exIdx]={...exs[exIdx], increment: val===""?null:Number(val)}; d[dayIdx]={...d[dayIdx],exercises:exs}; return {...p,days:d}; });
  }
  function addExercise(dayIdx, ex) {
    if (!ex.trim()) return;
    setEditProgram(p=>{ const d=[...p.days]; d[dayIdx]={...d[dayIdx],exercises:[...d[dayIdx].exercises,{name:ex.trim(),sets:defaultSets(ex.trim())}]}; return {...p,days:d}; });
  }
  function removeExercise(dayIdx, exIdx) {
    setEditProgram(p=>{ const d=[...p.days]; d[dayIdx]={...d[dayIdx],exercises:d[dayIdx].exercises.filter((_,i)=>i!==exIdx)}; return {...p,days:d}; });
  }
  function moveExercise(dayIdx, exIdx, dir) {
    setEditProgram(p=>{
      const d=[...p.days]; const exs=[...d[dayIdx].exercises];
      const swap=exIdx+dir; if(swap<0||swap>=exs.length) return p;
      [exs[exIdx],exs[swap]]=[exs[swap],exs[exIdx]];
      d[dayIdx]={...d[dayIdx],exercises:exs}; return {...p,days:d};
    });
  }
  function addDay() {
    setEditProgram(p=>({...p,days:[...p.days,{name:`Day ${p.days.length+1}`,exercises:[]}]}));
  }
  function removeDay(i) {
    if (!window.confirm("Remove this day?")) return;
    setEditProgram(p=>({...p,days:p.days.filter((_,j)=>j!==i)}));
  }

  async function saveProgram() {
    setSaving(true);
    await Storage.saveProgram(userId, editProgram);
    onProgramSave(editProgram);
    setSaving(false);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }

  const [newExInputs, setNewExInputs] = useState({});
  const [editingEx, setEditingEx] = useState(null); // "dayIdx-exIdx"

  const [settingsTab, setSettingsTab] = React.useState("you");
  const STABS = [["you","You"],["appearance","Appearance"],["plan","Training Plan"],["account","Account"]];

  return (
    <div style={{ maxWidth:600 }}>
      {/* Pill nav */}
      <div style={{ display:"flex", gap:6, marginBottom:20, flexWrap:"wrap" }}>
        {STABS.map(([id, label]) => (
          <button key={id} onClick={()=>setSettingsTab(id)}
            style={{ padding:"6px 16px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", border:"1px solid "+(settingsTab===id ? T.accent : T.border), background:settingsTab===id ? T.accent+"22" : "transparent", color:settingsTab===id ? T.accent : T.muted, transition:"all 0.15s" }}>
            {label}
          </button>
        ))}
      </div>

      {settingsTab === "you" && (
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>You</div>
          <div style={{ fontSize:11, color:T.dim, marginBottom:16 }}>Used for BMI, RMR, and nutrition targets.</div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Display Name</label>
            <input style={S.input} placeholder="e.g. Chessie" value={profForm.displayName} onChange={e=>setProfForm(f=>({...f,displayName:e.target.value}))} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div>
              <label style={S.label}>Height</label>
              <div style={{ display:"flex", gap:6 }}>
                <input style={{ ...S.input, width:60 }} type="number" placeholder="ft" value={profForm.heightFt} onChange={e=>setProfForm(f=>({...f,heightFt:e.target.value}))} />
                <input style={{ ...S.input, width:60 }} type="number" placeholder="in" value={profForm.heightIn} onChange={e=>setProfForm(f=>({...f,heightIn:e.target.value}))} />
              </div>
            </div>
            <div>
              <label style={S.label}>Birthday</label>
              <input style={S.input} type="date" value={profForm.birthday} onChange={e=>setProfForm(f=>({...f,birthday:e.target.value}))} />
              {profForm.birthday && <div style={{ fontSize:10, color:T.dim, marginTop:3 }}>Age: {calcAge(profForm.birthday)}</div>}
            </div>
            <div style={{ gridColumn:"1/-1" }}>
              <label style={S.label}>Sex</label>
              <div style={{ display:"flex", gap:8 }}>
                {["female","male"].map(s => (
                  <button key={s} onClick={()=>setProfForm(f=>({...f,sex:s}))}
                    style={{ ...S.btnSm, background:profForm.sex===s?T.accent+"22":T.border, color:profForm.sex===s?T.accent:T.muted, border:"1px solid "+(profForm.sex===s?T.accent+"55":T.border) }}>
                    {s.charAt(0).toUpperCase()+s.slice(1)}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div>
              <label style={S.label}>Calorie target</label>
              <input style={S.input} type="number" placeholder="2100" value={profForm.calTarget} onChange={e=>setProfForm(f=>({...f,calTarget:e.target.value}))} />
            </div>
            <div>
              <label style={S.label}>Protein target (g)</label>
              <input style={S.input} type="number" placeholder="165" value={profForm.proteinTarget} onChange={e=>setProfForm(f=>({...f,proteinTarget:e.target.value}))} />
            </div>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Activity multiplier</label>
            <select style={S.input} value={profForm.activityMultiplier} onChange={e=>setProfForm(f=>({...f,activityMultiplier:e.target.value}))}>
              <option value="1.375">1.375 — Lightly active (1-3 days/week)</option>
              <option value="1.55">1.55 — Moderately active (3-5 days/week)</option>
              <option value="1.6">1.6 — Active (4 days lifting + cardio)</option>
              <option value="1.725">1.725 — Very active (hard training daily)</option>
            </select>
            <div style={{ fontSize:10, color:T.dim, marginTop:3 }}>Used to estimate TDEE from your RMR.</div>
          </div>
          <div style={{ marginBottom:14 }}>
            <label style={S.label}>Program start date (Week 1, Day 1)</label>
            <input style={S.input} type="date" value={profForm.week1Start} onChange={e=>setProfForm(f=>({...f,week1Start:e.target.value}))} />
            <div style={{ fontSize:10, color:T.dim, marginTop:3 }}>Current week calculated from this date.</div>
          </div>
          <button style={S.btn} onClick={saveProfile} disabled={profSaving}>
            {profSaving ? "Saving…" : profSaved ? "✓ Saved!" : "Save"}
          </button>
        </div>
      )}

      {settingsTab === "appearance" && (
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:16 }}>Appearance</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:T.text }}>Theme</div>
              <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{darkMode ? "Dark mode" : "Light mode"}</div>
            </div>
            <div onClick={onToggleDark} style={{ width:48, height:26, borderRadius:13, background:darkMode?T.accent:T.border, cursor:"pointer", position:"relative", transition:"background 0.2s" }}>
              <div style={{ position:"absolute", top:3, left:darkMode?24:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }} />
            </div>
          </div>
        </div>
      )}

      {settingsTab === "plan" && (
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>Training Plan</div>
          <div style={{ fontSize:11, color:T.dim, marginBottom:16 }}>Rename days, reorder or add/remove exercises. Changes take effect immediately in Workouts.</div>
          {editProgram.days.map((day, dayIdx) => (
            <div key={dayIdx} style={{ ...S.card, marginBottom:12, padding:"12px 14px" }}>
              <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
                <input style={{ ...S.input, fontWeight:700, fontSize:13 }} value={day.name}
                  onChange={e=>updateDayName(dayIdx, e.target.value)} />
                <button style={{ background:"transparent", border:"none", color:T.red, cursor:"pointer", fontSize:16, padding:"0 4px" }}
                  onClick={()=>removeDay(dayIdx)} title="Remove day">x</button>
              </div>
              {day.exercises.map((exEntry, exIdx) => {
                const ex = exName(exEntry);
                const sets = exSets(exEntry);
                const key = dayIdx+"-"+exIdx;
                const isEditing = editingEx === key;
                const repRange = exRepMin(exEntry)+"–"+exRepMax(exEntry);
                return (
                  <div key={exIdx} style={{ marginBottom:6 }}>
                    {!isEditing && (
                      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 8px", borderRadius:6, cursor:"pointer" }}
                        onClick={()=>setEditingEx(key)}>
                        <span style={{ flex:1, fontSize:12, color:T.text }}>{ex}</span>
                        <span style={{ fontSize:10, color:T.dim }}>{sets} sets · {repRange} reps</span>
                      </div>
                    )}
                    {isEditing && (
                      <div style={{ background:T.border, borderRadius:8, padding:"10px 10px", marginBottom:2 }}>
                        <div style={{ fontSize:11, fontWeight:600, color:T.accent, marginBottom:8 }}>{ex}</div>
                        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8, flexWrap:"wrap" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ fontSize:11, color:T.muted }}>Sets</span>
                            <input style={{ ...S.input, width:44, padding:"4px 6px", textAlign:"center", fontSize:12 }}
                              type="number" min="1" max="10" value={sets}
                              onChange={e=>updateExSets(dayIdx, exIdx, e.target.value)} />
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ fontSize:11, color:T.muted }}>+lbs</span>
                            <input style={{ ...S.input, width:44, padding:"4px 6px", textAlign:"center", fontSize:12 }}
                              type="number" min="0.5" step="0.5"
                              placeholder={exEntry.increment != null ? "" : "auto"}
                              value={exEntry.increment != null ? exEntry.increment : ""}
                              onChange={e=>updateExIncrement(dayIdx, exIdx, e.target.value)} />
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ fontSize:11, color:T.muted }}>Reps</span>
                            <input style={{ ...S.input, width:44, padding:"4px 6px", textAlign:"center", fontSize:12 }}
                              type="number" min="1" value={exRepMin(exEntry)}
                              onChange={e=>updateExReps(dayIdx, exIdx, "repMin", e.target.value)} />
                            <span style={{ fontSize:11, color:T.dim }}>–</span>
                            <input style={{ ...S.input, width:44, padding:"4px 6px", textAlign:"center", fontSize:12 }}
                              type="number" min="1" value={exRepMax(exEntry)}
                              onChange={e=>updateExReps(dayIdx, exIdx, "repMax", e.target.value)} />
                          </div>
                          <div style={{ display:"flex", gap:4, marginLeft:"auto" }}>
                            <button style={S.btnSm} onClick={()=>moveExercise(dayIdx,exIdx,-1)}>↑</button>
                            <button style={S.btnSm} onClick={()=>moveExercise(dayIdx,exIdx,1)}>↓</button>
                            <button style={{ ...S.btnSm, color:T.red, border:"1px solid "+T.red+"44" }} onClick={()=>{ removeExercise(dayIdx,exIdx); setEditingEx(null); }}>Remove</button>
                            <button style={{ ...S.btn, padding:"4px 12px", fontSize:11 }} onClick={()=>setEditingEx(null)}>Done</button>
                          </div>
                        </div>
                        <WarmupEditor exName={ex} exEntry={exEntry} onUpdate={warmups => {
                          setEditProgram(p => {
                            const d = [...p.days]; const exs = [...d[dayIdx].exercises];
                            exs[exIdx] = { ...exs[exIdx], warmups };
                            d[dayIdx] = { ...d[dayIdx], exercises: exs };
                            return { ...p, days: d };
                          });
                        }} />
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{ display:"flex", gap:6, marginTop:8 }}>
                <input style={{ ...S.input, fontSize:11 }} placeholder="Add exercise…"
                  value={newExInputs[dayIdx]||""}
                  onChange={e=>setNewExInputs(n=>({...n,[dayIdx]:e.target.value}))}
                  onKeyDown={e=>{ if(e.key==="Enter"){ addExercise(dayIdx, newExInputs[dayIdx]||""); setNewExInputs(n=>({...n,[dayIdx]:""})); }}} />
                <button style={S.btnSm} onClick={()=>{ addExercise(dayIdx, newExInputs[dayIdx]||""); setNewExInputs(n=>({...n,[dayIdx]:""})); }}>Add</button>
              </div>
            </div>
          ))}
          <button style={{ ...S.btnSm, marginBottom:14 }} onClick={addDay}>+ Add Day</button>
          <button style={{ ...S.btn, width:"100%" }} onClick={saveProgram} disabled={saving}>
            {saving ? "Saving…" : saved ? "✓ Saved!" : "Save Program"}
          </button>
        </div>
      )}

      {settingsTab === "account" && (
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:16 }}>Account</div>
          <div style={{ fontSize:12, color:T.muted, marginBottom:12 }}>{user.email}</div>
          {!demoMode && <button style={S.btnDanger} onClick={onSignOut}>Sign out</button>}
          {demoMode && <div style={{ fontSize:11, color:T.dim }}>Demo account — sign out disabled.</div>}
          <div style={{ marginTop:16, paddingTop:16, borderTop:"1px solid "+T.border }}>
            <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:8 }}>Public Profile</div>
            <div style={{ fontSize:11, color:T.dim, marginBottom:12 }}>Share your progress publicly — no login required.</div>
            <a href={profileUrl} target="_blank" style={{ ...S.btn, textDecoration:"none", display:"inline-block" }}>View Public Profile →</a>
          </div>
        </div>
      )}
    </div>
  );
}

// ONBOARDING SCREEN
// ─────────────────────────────────────────────────────────────────────────────

function OnboardingScreen({ userId, onComplete }) {
  const [form, setForm] = useState({ name:"", heightFt:"", heightIn:"", weight:"", age:"", sex:"" });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function handleSave() {
    if (!form.weight || !form.heightFt) { setError("Height and weight are required."); return; }
    setSaving(true);
    const heightIn = (Number(form.heightFt)*12) + Number(form.heightIn||0);
    const profile = {
      name: form.name,
      heightIn,
      weight: Number(form.weight),
      age: form.age ? Number(form.age) : null,
      sex: form.sex || null,
    };
    await Storage.saveProfile(userId, profile);
    // Also log the starting weight as first metric
    await Storage.upsertMetric(userId, { date: new Date().toISOString().slice(0,10), weight: profile.weight, bodyFat: null });
    onComplete(profile);
  }

  const heightIn = (Number(form.heightFt)*12) + Number(form.heightIn||0);
  const bmi = form.weight && heightIn ? ((Number(form.weight) / (heightIn * heightIn)) * 703).toFixed(1) : null;

  return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ ...S.card, maxWidth:440, width:"100%" }}>
        <div style={{ fontSize:22, fontWeight:700, color:T.accent, marginBottom:4 }}>Welcome 👋</div>
        <div style={{ fontSize:13, color:T.muted, marginBottom:24 }}>Let's get a few basics before we start tracking.</div>

        <div style={{ marginBottom:14 }}>
          <label style={S.label}>Your Name (optional)</label>
          <input style={S.input} placeholder="e.g. Alex" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} />
        </div>

        <div style={{ marginBottom:14 }}>
          <label style={S.label}>Height</label>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ flex:1 }}>
              <input style={S.input} type="number" placeholder="ft" value={form.heightFt} onChange={e=>setForm(f=>({...f,heightFt:e.target.value}))} />
            </div>
            <div style={{ flex:1 }}>
              <input style={S.input} type="number" placeholder="in" value={form.heightIn} onChange={e=>setForm(f=>({...f,heightIn:e.target.value}))} />
            </div>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <label style={S.label}>Current Weight (lbs)</label>
          <input style={S.input} type="number" placeholder="lbs" value={form.weight} onChange={e=>setForm(f=>({...f,weight:e.target.value}))} />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
          <div>
            <label style={S.label}>Age (optional)</label>
            <input style={S.input} type="number" placeholder="years" value={form.age} onChange={e=>setForm(f=>({...f,age:e.target.value}))} />
          </div>
          <div>
            <label style={S.label}>Sex (optional)</label>
            <select style={S.select} value={form.sex} onChange={e=>setForm(f=>({...f,sex:e.target.value}))}>
              <option value="">Prefer not to say</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
            </select>
          </div>
        </div>

        {bmi && (
          <div style={{ ...S.card, marginBottom:14, padding:"10px 14px", background:T.border }}>
            <span style={{ fontSize:11, color:T.muted }}>BMI: </span>
            <span style={{ fontSize:13, fontWeight:700, color:T.text }}>{bmi}</span>
            <span style={{ fontSize:11, color:T.dim, marginLeft:8 }}>
              {bmi<18.5?"Underweight":bmi<25?"Normal":bmi<30?"Overweight":"Obese"}
            </span>
          </div>
        )}

        {error && <div style={{ color:T.red, fontSize:11, marginBottom:10 }}>{error}</div>}
        <button style={{ ...S.btn, width:"100%" }} onClick={handleSave} disabled={saving}>
          {saving ? "Saving…" : "Get Started →"}
        </button>
      </div>
    </div>
  );
}

  function addWorkout(entry)   { setSession(s=>({...s,workouts:[...s.workouts,{...entry,id:Date.now()}]})); setDemoActive(true); }
  function upsertMetric(m)     {
    if (m?._delete) { setSession(s=>({...s,metrics:s.metrics.filter(x=>x.date!==m.date)})); }
    else { setSession(s=>{ const f=s.metrics.filter(x=>x.date!==m.date); return {...s,metrics:[...f,m].sort((a,b)=>a.date.localeCompare(b.date))}; }); }
    setDemoActive(true);
  }
  function upsertNutrition(n)  { setSession(s=>{ const f=s.nutrition.filter(x=>x.date!==n.date); return {...s,nutrition:[...f,n].sort((a,b)=>a.date.localeCompare(b.date))}; }); setDemoActive(true); }
  function addCardio(c)        { setSession(s=>({...s,cardio:[...s.cardio,{...c,id:Date.now()}]})); setDemoActive(true); }
  function saveProgram(p)      { setSession(s=>({...s,program:p})); setDemoActive(true); }
  function saveRmr(r)          { setSession(s=>({...s,rmr:r})); setDemoActive(true); }
  function saveProfile(p)      { setSession(s=>({...s,userProfile:p})); setDemoActive(true); }

  const { workouts, metrics, nutrition, cardio, program, rmr, userProfile } = session;
  const TABS = ["overview","workouts","progress","body","log","settings"];

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:T.accent, letterSpacing:"0.08em", textTransform:"uppercase" }}>Alex's Fitness</div>
          <div style={{ fontSize:10, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:2 }}>Demo Profile</div>
        </div>
        <span style={{ ...S.tag(T.accent), fontSize:10 }}>👁 Demo</span>
      </div>
      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t} style={S.navBtn(tab===t)} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>
      <div style={{ background: demoActive ? T.amber+"22" : T.accent+"11", borderBottom:`1px solid ${demoActive?T.amber+"55":T.accent+"33"}`, padding:"8px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <span style={{ fontSize:11, color: demoActive ? T.amber : T.muted }}>
          {demoActive ? "🧪 Demo mode — changes reset on refresh" : "✨ Try it out! All changes are session-only and reset on refresh."}
        </span>
        {demoActive && (
          <button style={{ ...S.btnSm, fontSize:10, background:"transparent", color:T.amber, border:`1px solid ${T.amber}55` }} onClick={resetSession}>
            Reset
          </button>
        )}
      </div>
      <div style={S.content}>
        {tab==="overview"  && <OverviewTab workouts={workouts} metrics={metrics} nutrition={nutrition} currentWeek={autoWeek} cardio={cardio} rmr={rmr} userProfile={userProfile} />}
        {tab==="workouts"  && <NextWorkoutTab workouts={workouts} currentWeek={currentWeek} userId={null} onWorkoutAdded={addWorkout} program={program} manualWeek={manualWeek} setManualWeek={setManualWeek} autoWeek={autoWeek} demoMode={true} />}
        {tab==="progress"  && <ProgressTab workouts={workouts} />}
        {tab==="body"      && <BodyTab metrics={metrics} nutrition={nutrition} rmr={rmr} userId={null} onRmrSave={saveRmr} onMetricUpsert={upsertMetric} userProfile={userProfile} />}
        {tab==="log"       && <LogTab workouts={workouts} nutrition={nutrition} metrics={metrics} cardio={cardio} currentWeek={currentWeek} userId={null} onWorkoutAdded={addWorkout} onNutritionUpsert={upsertNutrition} onMetricUpsert={upsertMetric} onCardioAdded={addCardio} demoMode={true} />}
        {tab==="settings"  && <SettingsTab darkMode={darkMode} onToggleDark={()=>setDarkMode(d=>!d)} user={{ email:"alex@demo.com" }} onSignOut={()=>{}} profileUrl="#" program={program} userId={null} onProgramSave={saveProgram} userProfile={userProfile} onProfileSave={saveProfile} demoMode={true} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AlexApp />);
</script>
</body>
</html>

function lsKey(uid, t) { return `hj_${uid}_${t}`; }
function lsGet(uid, t) { try { return JSON.parse(localStorage.getItem(lsKey(uid,t))) || []; } catch { return []; } }
function lsSet(uid, t, d) { localStorage.setItem(lsKey(uid,t), JSON.stringify(d)); }

function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; }
  return String(h);
}

const Storage = {
  async initUser(uid, isChessie) {
    try {
      const { data } = await Promise.race([
        sb.from("workouts").select("id").eq("user_id", uid).limit(1),
        new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 5000))
      ]);
      if (data && data.length === 0) {
        if (isChessie) {
          // Seed Chessie's full history
          const workouts = SEED_WORKOUTS.map(w => ({ ...w, user_id: uid, sets: w.sets }));
          await sb.from("workouts").insert(workouts);
          const metrics = SEED_METRICS.map(m => ({ ...m, user_id: uid }));
          await sb.from("metrics").insert(metrics);
        }
        // Save default program config for all new users
        await Storage.saveProgram(uid, DEFAULT_PROGRAM);
      }
    } catch(e) {
      console.warn("initUser skipped:", e.message);
    }
  },
  async saveProgram(uid, program) {
    try {
      await sb.from("user_settings").upsert({ user_id: uid, key: "program", value: JSON.stringify(program) }, { onConflict: "user_id,key" });
    } catch(e) { console.warn("saveProgram:", e.message); }
  },
  async getProgram(uid) {
    try {
      const { data } = await sb.from("user_settings").select("value").eq("user_id", uid).eq("key", "program").single();
      return data ? JSON.parse(data.value) : DEFAULT_PROGRAM;
    } catch(e) { return DEFAULT_PROGRAM; }
  },
  async getWorkouts(uid) {
    try {
      const to = new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 8000));
      const { data } = await Promise.race([sb.from("workouts").select("*").eq("user_id", uid).order("week").order("date"), to]);
      return (data || []).map(w => ({ ...w, sets: typeof w.sets === "string" ? JSON.parse(w.sets) : w.sets }));
    } catch(e) { console.warn("getWorkouts:", e.message); return []; }
  },
  async addWorkout(uid, w) {
    const { data } = await sb.from("workouts").insert({ ...w, user_id: uid }).select().single();
    return data;
  },
  async deleteWorkout(uid, id) {
    await sb.from("workouts").delete().eq("id", id).eq("user_id", uid);
  },
  async updateWorkout(uid, id, updates) {
    await sb.from("workouts").update(updates).eq("id", id).eq("user_id", uid);
  },
  async getMetrics(uid) {
    try {
      const to = new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 8000));
      const { data } = await Promise.race([sb.from("metrics").select("*").eq("user_id", uid).order("date"), to]);
      return (data || []).map(m => ({ ...m, bodyFat: m.body_fat }));
    } catch(e) { console.warn("getMetrics:", e.message); return []; }
  },
  async upsertMetric(uid, m) {
    const { error } = await sb.from("metrics").upsert({ user_id: uid, date: m.date, weight: m.weight ?? null, body_fat: m.bodyFat ?? null }, { onConflict: "user_id,date" });
    if (error) { console.error("upsertMetric error:", error); throw error; }
  },
  async deleteMetric(uid, date) {
    await sb.from("metrics").delete().eq("user_id", uid).eq("date", date);
  },

      const { data } = await Promise.race([sb.from("nutrition").select("*").eq("user_id", uid).order("date"), to]);
      return data || [];
    } catch(e) { console.warn("getNutrition:", e.message); return []; }
  },
  async upsertNutrition(uid, n) {
    await sb.from("nutrition").upsert({ ...n, user_id: uid }, { onConflict: "user_id,date" });
  },
};

const Auth = {

// FITNESS HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function e1rm(w,r) { return r===1 ? w : w*(1+r/30); }
function avgE1rm(sets) { const v=sets.map(s=>e1rm(s.weight,s.reps)); return v.reduce((a,b)=>a+b,0)/v.length; }
function isDeloadWeek(w) { return w%6===0; }
function getExHistory(workouts, ex) { return workouts.filter(w=>w.exercise===ex).sort((a,b)=>a.week-b.week); }
function sevenDayAvg(entries, field) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7);
  const r = entries.filter(e=>new Date(e.date)>=cutoff && e[field]!=null);
  if (!r.length) return null;
  return Math.round(r.reduce((a,e)=>a+e[field],0)/r.length);
}

function getSuggestion(history, isDeload, exercise) {
  const sorted = [...history].sort((a,b)=>a.week-b.week);
  if (!sorted.length) return null;
  const recent = sorted[sorted.length-1];
  const twoBack = sorted.length>=2 ? sorted[sorted.length-2] : null;
  const [repMin,repMax] = REP_SCHEMES[exercise]||[6,8];
  const lastSets = recent.sets;
  const lastWeight = lastSets[lastSets.length-1].weight;
  const workingSets = lastSets.filter(s=>s.weight===lastWeight);
  const totalRepsRecent = workingSets.reduce((a,s)=>a+s.reps,0);
  const sameWeight = twoBack && lastWeight===twoBack.sets[twoBack.sets.length-1].weight;
  const totalRepsTwoBack = twoBack
    ? twoBack.sets.filter(s=>s.weight===twoBack.sets[twoBack.sets.length-1].weight).reduce((a,s)=>a+s.reps,0)
    : null;
  const isStalling = sameWeight && totalRepsTwoBack!=null && totalRepsRecent<totalRepsTwoBack;
  const allHitTop = workingSets.every(s=>s.reps>=repMax);
  const anyBelowBottom = workingSets.some(s=>s.reps<repMin);
  const intensity = recent.intensity || "medium";
  let suggestedWeight = lastWeight, note="";
  if (isDeload) {
    suggestedWeight = Math.round(lastWeight*0.6/2.5)*2.5;
    note="🔄 Deload — drop to 60%, focus on form.";
  } else if (isStalling) {
    suggestedWeight = Math.round(lastWeight*0.9/2.5)*2.5;
    note="⚠️ Stall detected. Back off 10%, rebuild.";
  } else if (anyBelowBottom) {
    suggestedWeight = Math.round(lastWeight*0.9/2.5)*2.5;
    note=`⚠️ Reps dropped below ${repMin}. Drop weight.`;
  } else if (allHitTop) {
    if (intensity === "very hard") {
      suggestedWeight = lastWeight;
      note=`⚠️ Hit ${repMax} reps but felt very hard — hold weight and consolidate.`;
    } else {
      const inc = lastWeight>=100?5:2.5;
      suggestedWeight = lastWeight+inc;
      note = intensity === "easy"
        ? `✅ All sets hit ${repMax} reps and felt easy. Add ${inc}lbs — could push harder next time.`
        : `✅ All sets hit ${repMax}. Add ${inc}lbs.`;
    }
  } else {
    const missed = workingSets.filter(s=>s.reps<repMax).length;
    const prog = totalRepsTwoBack!=null?` (${totalRepsTwoBack}→${totalRepsRecent} total reps)`:"";
    note=`📈 ${missed} set${missed>1?"s":""} below ${repMax}. Hold weight${prog}.`;
  }
  return { suggestedWeight, note, isStalling, repMin, repMax, basedOnWeek:recent.week, intensity };
}

function ProgressBar({ value, max, color }) {
  const pct = Math.min(100, Math.round((value/max)*100));
  return (
    <div style={{ background:T.border, borderRadius:4, height:6, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, height:"100%", background:color||T.accent, transition:"width 0.3s" }} />
    </div>
  );
}

function MiniChart({ data, color }) {
  if (data.length < 2) return <span style={{ color:T.dim, fontSize:11 }}>Not enough data</span>;
  const H=60, pad=12, VW=280;
  const vals = data.map(d=>d.y);
  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const range = maxV-minV || 1;
  const coords = data.map((d,i) => ({
    x: pad + (i/(data.length-1))*(VW-pad*2),
    y: H-pad - ((d.y-minV)/range)*(H-pad*2),
  }));
  const pts = coords.map(c=>`${c.x},${c.y}`).join(" ");
  return (
    <svg viewBox={`0 0 ${VW} ${H+16}`} width="100%" height={H+16} style={{ display:"block" }}>
      <polyline fill="none" stroke={color||T.accent} strokeWidth={2} points={pts} />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r={3} fill={color||T.accent} />
          {(i === 0 || i === coords.length-1) && (
            <text x={c.x} y={c.y-6} textAnchor={i===0?"start":"end"} fontSize="8" fill={color||T.accent} fontFamily="Inter,sans-serif">
              {data[i].y}
            </text>
          )}
        </g>
      ))}
    </svg>
  );
}

function SetsDisplay({ sets }) {
  const weights = sets.map(s=>s.weight);
  const uniform = weights.every(w=>w===weights[0]);
  if (uniform) return (
    <>
      <div style={{ fontSize:26, fontWeight:700, color:T.text }}>{weights[0]}<span style={{ fontSize:12, color:T.muted }}> lbs</span></div>

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [showPassword, setShowPassword] = useState(false);

  async function handleSubmit() {
    setError(""); setMessage(""); setLoading(true);
    try {
      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out. Check your internet connection.")), 8000));
      const authPromise = mode === "signin"
        ? Auth.signIn(email.trim(), password)
        : Auth.signUp(email.trim(), password);
      const result = await Promise.race([authPromise, timeoutPromise]);
      setLoading(false);
      if (result.error) { setError(result.error); return; }
      if (result.user) onAuth(result.user);
    } catch(e) {
      setLoading(false);
      setError(e.message || "Something went wrong. Try again.");
    }
  }

  async function handleForgotPassword() {
    if (!email.trim()) { setError("Enter your email above first."); return; }
    setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim(), {
      redirectTo: window.location.origin,
    });
    setLoading(false);
    if (error) setError(error.message);
    else setMessage("Password reset email sent — check your inbox.");
  }

  return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ ...S.card, width:380, padding:"36px 32px" }}>
        <div style={{ fontSize:22, fontWeight:700, color:T.accent, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4 }}>Health Journal</div>
        <div style={{ fontSize:11, color:T.muted, marginBottom:28, letterSpacing:"0.1em", textTransform:"uppercase" }}>Progressive Overload Tracker</div>
        <div style={{ marginBottom:14 }}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} autoFocus />
        </div>
        <div style={{ marginBottom:6 }}>
          <label style={S.label}>Password</label>
          <div style={{ position:"relative" }}>
            <input style={{ ...S.input, paddingRight:44 }} type={showPassword?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} />
            <span onClick={()=>setShowPassword(p=>!p)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", cursor:"pointer", fontSize:11, color:T.muted, userSelect:"none" }}>
              {showPassword?"Hide":"Show"}
            </span>
          </div>
        </div>
        {mode === "signin" && (
          <div style={{ textAlign:"right", marginBottom:16 }}>
            <span style={{ fontSize:11, color:T.accent, cursor:"pointer" }} onClick={handleForgotPassword}>Forgot password?</span>
          </div>
        )}
        {!message && <div style={{ marginBottom:16 }} />}
        {error && <div style={{ color:T.red, fontSize:12, marginBottom:14 }}>{error}</div>}
        {message && <div style={{ color:T.green, fontSize:12, marginBottom:14 }}>{message}</div>}
        <button style={{ ...S.btn, width:"100%", padding:"10px" }} onClick={handleSubmit} disabled={loading}>
          {loading ? "..." : mode==="signin" ? "Sign In" : "Create Account"}
        </button>
        <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:T.muted }}>
          {mode==="signin" ? "No account? " : "Already have one? "}
          <span style={{ color:T.accent, cursor:"pointer" }} onClick={()=>{setMode(mode==="signin"?"signup":"signin");setError("");setMessage("");}}>
            {mode==="signin" ? "Sign up" : "Sign in"}
          </span>
        </div>
      </div>
    </div>
  );
}

    const gain = prev ? rm - Math.round(avgE1rm(prev.sets)) : 0;
    return { ex, rm, gain };

  const dayColor = DAY_COLORS[selectedDay] || T.accent;

  const dayExercises = useMemo(() => {
    return currentDayConfig.exercises.map(ex => {
      const hist = getExHistory(workouts, ex);
      const currentEntry = hist.find(h=>h.week===currentWeek && h.day===selectedDay)||null;
      const histUpToPrev = hist.filter(h=>h.week<currentWeek);
      const prevEntry = histUpToPrev.slice(-1)[0]||null;
      const suggCurrent = !currentEntry ? getSuggestion(histUpToPrev, isDeloadWeek(currentWeek), ex) : null;
      return { exercise:ex, currentEntry, prevEntry, suggCurrent };
    });
  }, [workouts, selectedDay, currentWeek, program]);

  function openLog(ex, sugg) {
    setExpandedEx(ex);
    setLogNotes("");
    setLogIntensity("medium");
    const w = sugg?.suggestedWeight || "";
    const numSets = defaultSets(ex);
    setLogSets(Array(numSets).fill(null).map(()=>({ reps:"", weight:w })));
  }

  function closeLog() { setExpandedEx(null); }

  async function saveLog(exercise) {
    const sets = logSets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)}));
    if (!sets.length) return;
    setSaving(true);
    const today = new Date().toISOString().split("T")[0];
    await Storage.addWorkout(userId, { week:currentWeek, day:selectedDay, date:today, exercise, sets, notes:logNotes, intensity:logIntensity });
    onWorkoutAdded();
    setSaving(false);
    setExpandedEx(null);
  }

  async function saveWeek1() {
    const exercises = currentDayConfig.exercises;
    const hasWeights = exercises.some(ex => week1Weights[ex]);
    if (!hasWeights) return;
    setSavingWeek1(true);
    const today = new Date().toISOString().split("T")[0];
    const [repMin, repMax] = [8, 12]; // default middle rep range for week 1
    for (const ex of exercises) {
      const w = Number(week1Weights[ex]);
      if (!w) continue;
      const numSets = defaultSets(ex);
      const [rMin] = REP_SCHEMES[ex] || [8,12];
      const sets = Array(numSets).fill(null).map(()=>({ reps:rMin, weight:w }));
      await Storage.addWorkout(userId, { week:1, day:selectedDay, date:today, exercise:ex, sets, notes:"Starting weight", intensity:"medium" });
    }
    onWorkoutAdded();
    setSavingWeek1(false);
  }

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {dayNames.map(d => (
          <button key={d} onClick={()=>{ setSelectedDay(d); setExpandedEx(null); }}
            style={{ ...S.btnSm, background:selectedDay===d?(DAY_COLORS[d]||T.accent)+"22":T.border, color:selectedDay===d?(DAY_COLORS[d]||T.accent):T.muted, border:`1px solid ${selectedDay===d?(DAY_COLORS[d]||T.accent)+"55":T.border}` }}>
            {d}
          </button>
        ))}
        <span style={{ fontSize:11, color:isDeloadWeek(currentWeek+1)?T.green:T.dim, alignSelf:"center", marginLeft:4 }}>
          {isDeloadWeek(currentWeek+1)?`🔄 Week ${currentWeek+1} is deload`:`Next: Week ${currentWeek+1}`}
        </span>
      </div>

      {/* Week 1 setup mode */}
      {currentWeek === 1 && !dayExercises.some(e=>e.currentEntry) && (
        <div style={{ ...S.card, marginBottom:16, border:`1px solid ${T.accent}44`, background:T.accent+"11" }}>
          <div style={{ fontSize:12, fontWeight:700, color:T.accent, marginBottom:4 }}>👋 Week 1 Setup</div>
          <div style={{ fontSize:11, color:T.muted, marginBottom:12 }}>Enter your starting weights for {selectedDay}. Use a weight you can do comfortably for the target reps.</div>
          {currentDayConfig.exercises.map(ex => {
            const [repMin, repMax] = REP_SCHEMES[ex] || [8,12];
            const numSets = defaultSets(ex);
            return (
              <div key={ex} style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:8, alignItems:"center", marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:12, fontWeight:600, color:T.text }}>{ex}</div>
                  <div style={{ fontSize:10, color:T.dim }}>{numSets} sets × {repMin}–{repMax} reps</div>
                </div>
                <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs"
                  value={week1Weights[ex]||""}
                  onChange={e=>setWeek1Weights(w=>({...w,[ex]:e.target.value}))} />
              </div>
            );
          })}
          <button style={{ ...S.btn, marginTop:8, width:"100%" }} onClick={saveWeek1} disabled={savingWeek1}>
            {savingWeek1 ? "Saving…" : `Save ${selectedDay} Starting Weights`}
          </button>
        </div>
      )}

      {/* Normal exercise cards */}
      {dayExercises.map(({ exercise, currentEntry, prevEntry, suggCurrent }) => {
        const isExpanded = expandedEx === exercise;
        const isDone = !!currentEntry;
        return (
          <div key={exercise} style={{ ...S.card, marginBottom:10, border:`1px solid ${isDone ? T.green+"55" : T.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:13, color:isDone?T.green:T.text }}>{exercise} {isDone && "✓"}</div>
                {prevEntry && (
                  <div style={{ fontSize:11, color:T.dim, marginTop:3 }}>
                    W{prevEntry.week}: {prevEntry.sets.map(s=>`${s.reps}×${s.weight}`).join(", ")}
                  </div>
                )}
                {isDone && (
                  <div style={{ fontSize:11, color:T.green, marginTop:3 }}>
                    Logged: {currentEntry.sets.map(s=>`${s.reps}×${s.weight}`).join(", ")}
                  </div>
                )}
                {!isExpanded && !isDone && suggCurrent && (
                  <div style={{ fontSize:12, color:T.muted, marginTop:4 }}>
                    Target: <span style={{ color:T.text, fontWeight:600 }}>{suggCurrent.suggestedWeight} lbs × {suggCurrent.repMin}–{suggCurrent.repMax}</span>
                    <span style={{ color:T.dim, marginLeft:8, fontSize:11 }}>{suggCurrent.note}</span>
                  </div>
                )}
              </div>
              {!isDone && (
                <button onClick={()=>isExpanded ? closeLog() : openLog(exercise, suggCurrent)}
                  style={{ ...S.btn, padding:"6px 14px", fontSize:11, marginLeft:12, background:isExpanded?T.border:T.accent, color:isExpanded?T.muted:"#0f2220" }}>
                  {isExpanded ? "Cancel" : "Log"}
                </button>
              )}
            </div>

            {isExpanded && (
              <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:12, marginTop:10 }}>
                {suggCurrent && (
                  <div style={{ fontSize:12, color:T.accent, marginBottom:10 }}>
                    Target: <strong>{suggCurrent.suggestedWeight} lbs × {suggCurrent.repMin}–{suggCurrent.repMax} reps</strong>
                  </div>
                )}
                <div style={{ marginBottom:8 }}>
                  <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Sets (reps / weight)</div>
                  {logSets.map((s,i) => (
                    <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                      <input style={{ ...S.input, width:70 }} type="number" placeholder="reps" value={s.reps}
                        onChange={e=>setLogSets(sets=>{ const n=[...sets]; n[i]={...n[i],reps:e.target.value}; return n; })} />
                      <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs" value={s.weight}
                        onChange={e=>setLogSets(sets=>{ const n=[...sets]; n[i]={...n[i],weight:e.target.value}; return n; })} />
                      {logSets.length>1 && <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14 }}
                        onClick={()=>setLogSets(s=>s.filter((_,j)=>j!==i))}>×</button>}
                    </div>
                  ))}
                  <button style={S.btnSm} onClick={()=>setLogSets(s=>[...s,{reps:"",weight:logSets[logSets.length-1]?.weight||""}])}>+ Set</button>
                </div>
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Intensity</div>
                  <div style={{ display:"flex", gap:6 }}>
                    {["easy","medium","hard","very hard"].map(level => (
                      <button key={level} onClick={()=>setLogIntensity(level)}
                        style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                          background: logIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                          color: logIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                          border: `1px solid ${logIntensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                        }}>
                        {level}
                      </button>
                    ))}
                  </div>
                </div>
                <input style={{ ...S.input, marginBottom:10 }} value={logNotes} onChange={e=>setLogNotes(e.target.value)} placeholder="Notes (optional)" />
                <button style={{ ...S.btn, width:"100%" }} onClick={()=>saveLog(exercise)} disabled={saving}>
                  {saving ? "Saving…" : "Save"}
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// EXERCISE TAB
// ─────────────────────────────────────────────────────────────────────────────
function ExerciseTab({ workouts, currentWeek }) {
  const allExercises = useMemo(()=>[...new Set(workouts.map(w=>w.exercise))].sort(),[workouts]);
  const [selected, setSelected] = useState(allExercises[0]||"");
  useEffect(()=>{ if (!selected && allExercises.length) setSelected(allExercises[0]); },[allExercises]);

  const hist = useMemo(()=>getExHistory(workouts,selected),[workouts,selected]);
  const suggestion = useMemo(()=>getSuggestion(hist,isDeloadWeek(currentWeek+1),selected),[hist,currentWeek,selected]);
  const chartData = hist.map(h=>({ x:h.week, y:Math.max(...h.sets.map(s=>s.weight)) }));

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <label style={S.label}>Exercise</label>
        <select style={{ ...S.select, maxWidth:300 }} value={selected} onChange={e=>setSelected(e.target.value)}>
          {allExercises.map(ex=><option key={ex}>{ex}</option>)}
        </select>
      </div>
      <div style={S.grid2}>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Weight Trend</div>
          <MiniChart data={chartData} color={T.accent} />
          <div style={{ marginTop:8, fontSize:11, color:T.muted }}>
            {chartData.length>=2 && (() => {
              const gain = chartData[chartData.length-1].y - chartData[0].y;
              return <span style={{ color:gain>=0?T.green:T.red }}>{gain>=0?"+":""}{gain} lbs since W{chartData[0].x}</span>;
            })()}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Week {currentWeek+1} Target</div>
          {suggestion ? (
            <>
              <div style={{ fontSize:28, fontWeight:700, color:T.accent }}>{suggestion.suggestedWeight}<span style={{ fontSize:13, color:T.muted }}> lbs</span></div>
              <div style={{ fontSize:12, color:T.muted, marginTop:4 }}>{suggestion.repMin}–{suggestion.repMax} reps</div>
              <div style={{ fontSize:11, color:T.dim, marginTop:8, lineHeight:1.5 }}>{suggestion.note}</div>
            </>
          ) : <div style={{ fontSize:12, color:T.dim }}>Not enough data.</div>}
        </div>
      </div>
      <div style={S.card}>
        <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Session History</div>
        {hist.length===0 && <div style={{ fontSize:12, color:T.dim }}>No data yet.</div>}
        {[...hist].reverse().map((h,i) => (
          <div key={i} style={{ padding:"10px 0", borderBottom:`1px solid ${T.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
              <div style={{ fontSize:12, fontWeight:600 }}>Week {h.week} <span style={{ color:T.dim, fontWeight:400 }}>— {h.day}</span>
                {h.intensity && h.intensity !== "medium" && <span style={{ ...S.tag({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[h.intensity]||T.dim), marginLeft:6, fontSize:9 }}>{h.intensity}</span>}
              </div>
              <span style={{ fontSize:11, color:T.accent, fontWeight:700 }}>e1RM: {Math.round(avgE1rm(h.sets))}</span>
            </div>
            <div style={{ fontSize:11, color:T.muted }}>
              {(() => {
                const weights = h.sets.map(s=>s.weight);
                const uniform = weights.every(w=>w===weights[0]);
                if (uniform) return <span>{h.sets.map(s=>s.reps).join(", ")} reps @ {weights[0]}lbs</span>;
                return h.sets.map((s,j)=><span key={j} style={{ marginRight:10 }}>{s.reps}×{s.weight}lbs</span>);
              })()}
            </div>
            {h.notes && <div style={{ fontSize:10, color:T.amber, marginTop:4 }}>⚠ {h.notes}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// LOG TAB
// ─────────────────────────────────────────────────────────────────────────────
function LogTab({ workouts, nutrition, metrics, cardio, currentWeek, userId, onWorkoutAdded, onNutritionUpsert, onMetricUpsert, onCardioAdded }) {
  const today = new Date().toISOString().slice(0,10);
  const allExercises = [...new Set(workouts.map(w=>w.exercise))].sort();

  const [wForm, setWForm] = useState({ week:currentWeek, day:DAYS[0], date:today, exercise:allExercises[0]||"", sets:[{reps:"",weight:""}], notes:"", intensity:"medium" });
  const [nForm, setNForm] = useState({ date:today, calories:"", protein:"" });
  const [mForm, setMForm] = useState({ date:today, weight:"", bodyFat:"" });
  const [cForm, setCForm] = useState({ date:today, type:"steady", duration:"", distance:"", speed:"", incline:"", heartRate:"", intervals:"" });
  const [cSuccess, setCSuccess] = useState("");

  function addSet() { setWForm(f=>({...f,sets:[...f.sets,{reps:"",weight:""}]})); }
  function removeSet(i) { setWForm(f=>({...f,sets:f.sets.filter((_,j)=>j!==i)})); }
  function updateSet(i,field,val) { setWForm(f=>{ const sets=[...f.sets]; sets[i]={...sets[i],[field]:val==""?"":Number(val)}; return {...f,sets}; }); }

  async function submitWorkout() {
    const entry = { ...wForm, week:Number(wForm.week), sets:wForm.sets.filter(s=>s.reps!==""&&s.weight!=="").map(s=>({reps:Number(s.reps),weight:Number(s.weight)})) };
    if (!entry.sets.length) return;
    await Storage.addWorkout(userId, entry);
    onWorkoutAdded();
    setWForm(f=>({...f,sets:[{reps:"",weight:""}],notes:"",intensity:"medium"}));
  }

  async function deleteWorkout(id) {
    if (!window.confirm("Delete this entry?")) return;
    await Storage.deleteWorkout(userId, id);
    onWorkoutAdded();
  }

  async function submitNutrition() {
    if (!nForm.calories && !nForm.protein) return;
    await Storage.upsertNutrition(userId, { date:nForm.date, calories:nForm.calories?Number(nForm.calories):null, protein:nForm.protein?Number(nForm.protein):null });
    onNutritionUpsert();
    setNForm(f=>({...f,calories:"",protein:""}));
  }

  async function submitCardio() {
    if (!cForm.duration) return;
    await Storage.addCardio(userId, {
      date: cForm.date,
      type: cForm.type,
      duration: Number(cForm.duration),
      distance: cForm.distance ? Number(cForm.distance) : null,
      speed: cForm.speed ? Number(cForm.speed) : null,
      incline: cForm.incline ? Number(cForm.incline) : null,
      heart_rate: cForm.heartRate ? Number(cForm.heartRate) : null,
      intervals: cForm.intervals || null,
    });
    onCardioAdded();
    setCForm(f=>({...f,duration:"",distance:"",speed:"",incline:"",heartRate:"",intervals:""}));
    setCSuccess("Saved!"); setTimeout(()=>setCSuccess(""),2000);
  }

  async function deleteCardio(id) {
    if (!window.confirm("Delete this cardio entry?")) return;
    await Storage.deleteCardio(userId, id);
    onCardioAdded();
  }

  const [mError, setMError] = useState("");
  const [mSuccess, setMSuccess] = useState("");

  async function submitMetric() {
    if (!mForm.weight) { setMError("Weight is required."); return; }
    setMError(""); setMSuccess("");
    try {
      await Storage.upsertMetric(userId, { date:mForm.date, weight:Number(mForm.weight), bodyFat:mForm.bodyFat?Number(mForm.bodyFat):null });
      setMSuccess("Saved!");
      setTimeout(() => setMSuccess(""), 2000);
      onMetricUpsert();
      setMForm(f=>({...f,weight:"",bodyFat:""}));
    } catch(e) {
      setMError("Failed to save: " + (e.message || "unknown error"));
    }
  }

  const [editingNutrition, setEditingNutrition] = useState(null); // date string
  const [editingMetric, setEditingMetric] = useState(null);       // date string
  const [editNValues, setEditNValues] = useState({});
  const [editMValues, setEditMValues] = useState({});

  function startEditNutrition(n) {
    setEditingNutrition(n.date);
    setEditNValues({ calories: n.calories ?? "", protein: n.protein ?? "" });
  }
  async function saveEditNutrition(date) {
    await Storage.upsertNutrition(userId, { date, calories: editNValues.calories !== "" ? Number(editNValues.calories) : null, protein: editNValues.protein !== "" ? Number(editNValues.protein) : null });
    setEditingNutrition(null);
    onNutritionUpsert();
  }

  function startEditMetric(m) {
    setEditingMetric(m.date);
    setEditMValues({ weight: m.weight ?? "", bodyFat: m.bodyFat ?? "" });
  }
  async function saveEditMetric(date) {
    await Storage.upsertMetric(userId, { date, weight: editMValues.weight !== "" ? Number(editMValues.weight) : null, bodyFat: editMValues.bodyFat !== "" ? Number(editMValues.bodyFat) : null });
    setEditingMetric(null);
    onMetricUpsert();
  }

  const recentNutrition = [...nutrition].reverse().slice(0,14);
  const recentMetrics = [...metrics].reverse().slice(0,10);

  return (
    <div>
      <div style={S.grid2}>
        {/* Workout log */}
        <div style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Workout</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div><label style={S.label}>Week</label><input style={S.input} type="number" value={wForm.week} onChange={e=>setWForm(f=>({...f,week:e.target.value}))} /></div>
            <div><label style={S.label}>Date</label><input style={S.input} type="date" value={wForm.date} onChange={e=>setWForm(f=>({...f,date:e.target.value}))} /></div>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Day</label>
            <select style={S.select} value={wForm.day} onChange={e=>setWForm(f=>({...f,day:e.target.value}))}>
              {DAYS.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Exercise</label>
            <input style={S.input} list="ex-list" value={wForm.exercise} onChange={e=>setWForm(f=>({...f,exercise:e.target.value}))} placeholder="Type or select..." />
            <datalist id="ex-list">{allExercises.map(ex=><option key={ex} value={ex}/>)}</datalist>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Sets (reps / weight lbs)</label>
            {wForm.sets.map((s,i)=>(
              <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
                <input style={{ ...S.input, width:70 }} type="number" placeholder="reps" value={s.reps} onChange={e=>updateSet(i,"reps",e.target.value)} />
                <input style={{ ...S.input, width:80 }} type="number" placeholder="lbs" value={s.weight} onChange={e=>updateSet(i,"weight",e.target.value)} />
                {wForm.sets.length>1&&<button style={S.btnDanger} onClick={()=>removeSet(i)}>✕</button>}
              </div>
            ))}
            <button style={S.btnSm} onClick={addSet}>+ Add Set</button>
          </div>
          <div style={{ marginBottom:10 }}>
            <label style={S.label}>Intensity</label>
            <div style={{ display:"flex", gap:6 }}>
              {["easy","medium","hard","very hard"].map(level => (
                <button key={level} onClick={()=>setWForm(f=>({...f,intensity:level}))}
                  style={{ ...S.btnSm, flex:1, textTransform:"capitalize",
                    background: wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]+"33") : T.border,
                    color: wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level]) : T.muted,
                    border: `1px solid ${wForm.intensity===level ? ({easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[level])+"66" : T.border}`,
                  }}>
                  {level}
                </button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:14 }}>
            <label style={S.label}>Notes (optional)</label>
            <input style={S.input} value={wForm.notes} onChange={e=>setWForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. modified grip" />
          </div>
          <button style={S.btn} onClick={submitWorkout}>Save Workout</button>
        </div>

        {/* Nutrition + metrics */}
        <div>
          <div style={{ ...S.card, marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Nutrition</div>
            <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={nForm.date} onChange={e=>setNForm(f=>({...f,date:e.target.value}))} /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              <div><label style={S.label}>Calories</label><input style={S.input} type="number" value={nForm.calories} onChange={e=>setNForm(f=>({...f,calories:e.target.value}))} placeholder={String(CAL_TARGET)} /></div>
              <div><label style={S.label}>Protein (g)</label><input style={S.input} type="number" value={nForm.protein} onChange={e=>setNForm(f=>({...f,protein:e.target.value}))} placeholder={String(PROTEIN_TARGET)} /></div>
            </div>
            <button style={S.btn} onClick={submitNutrition}>Save</button>
          </div>
          <div style={{ ...S.card, marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:14 }}>Log Body Metrics</div>
            <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={mForm.date} onChange={e=>setMForm(f=>({...f,date:e.target.value}))} /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              <div><label style={S.label}>Weight (lbs)</label><input style={S.input} type="number" value={mForm.weight} onChange={e=>setMForm(f=>({...f,weight:e.target.value}))} /></div>

            <div style={{ marginBottom:10 }}><label style={S.label}>Date</label><input style={S.input} type="date" value={cForm.date} onChange={e=>setCForm(f=>({...f,date:e.target.value}))} /></div>

                {["steady","hiit"].map(t=>(

                      background: cForm.type===t ? T.amber+"33" : T.border,

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>

          <div style={{ ...S.card, marginTop:16 }}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Recent Workouts</div>

              const intColor = {easy:T.green,medium:T.accent,hard:T.amber,"very hard":T.red}[w.intensity] || T.dim;

                <div key={w.id} style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:8, padding:"8px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center" }}>

                    <span style={{ fontWeight:600 }}>{w.exercise}</span>
                    <span style={{ color:T.dim, marginLeft:6 }}>W{w.week} · {w.day} · {w.date}</span>

        <div style={{ ...S.card, marginTop:16 }}>

            <span>Date</span><span>Calories</span><span>Protein</span><span></span>
          </div>
          {recentNutrition.map(n => {
            const editing = editingNutrition === n.date;
            return (
              <div key={n.date} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 80px", gap:8, padding:"7px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center" }}
                onClick={()=>!editing&&startEditNutrition(n)} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 80px", gap:8, padding:"7px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center", cursor:editing?"default":"pointer" }}>
                <span style={{ color:T.muted }}>{n.date}</span>
                {editing ? (
                  <>
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editNValues.calories} onChange={e=>setEditNValues(v=>({...v,calories:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editNValues.protein} onChange={e=>setEditNValues(v=>({...v,protein:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <div style={{ display:"flex", gap:4 }}>
                      <button style={{ ...S.btn, padding:"3px 8px", fontSize:11 }} onClick={e=>{e.stopPropagation();saveEditNutrition(n.date);}}>✓</button>
                      <button style={{ ...S.btnSm, padding:"3px 8px" }} onClick={e=>{e.stopPropagation();setEditingNutrition(null);}}>✕</button>
                    </div>
                  </>
                ) : (
                  <>
                    <span style={{ color:n.calories&&n.calories<=CAL_TARGET?T.green:n.calories>CAL_TARGET?T.red:T.muted }}>{n.calories??"—"}</span>
                    <span style={{ color:n.protein&&n.protein>=PROTEIN_TARGET?T.green:n.protein?T.amber:T.muted }}>{n.protein??"—"}g</span>
                    <span style={{ fontSize:10, color:T.dim }}>edit</span>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Metrics history */}
      {recentMetrics.length > 0 && (
        <div style={{ ...S.card, marginTop:16 }}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Metrics History — click a row to edit</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr auto", gap:8, fontSize:10, color:T.dim, marginBottom:6, padding:"0 4px" }}>
            <span>Date</span><span>Weight</span><span>Body Fat</span><span></span>
          </div>
          {recentMetrics.map((m,i) => {
            const prev = recentMetrics[i+1];
            const delta = prev&&m.weight&&prev.weight ? (m.weight-prev.weight).toFixed(1) : null;
            const editing = editingMetric === m.date;
            return (
              <div key={m.date} onClick={()=>!editing&&startEditMetric(m)}
                style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr auto", gap:8, padding:"7px 4px", borderTop:`1px solid ${T.border}`, fontSize:12, alignItems:"center", cursor:editing?"default":"pointer" }}>
                <span style={{ color:T.muted }}>{m.date}</span>
                {editing ? (
                  <>
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editMValues.weight} onChange={e=>setEditMValues(v=>({...v,weight:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <input style={{ ...S.input, padding:"3px 6px" }} type="number" value={editMValues.bodyFat} onChange={e=>setEditMValues(v=>({...v,bodyFat:e.target.value}))} onClick={e=>e.stopPropagation()} />
                    <div style={{ display:"flex", gap:4 }}>
                      <button style={{ ...S.btn, padding:"3px 8px", fontSize:11 }} onClick={e=>{e.stopPropagation();saveEditMetric(m.date);}}>✓</button>
                      <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14, padding:"2px 6px" }} onClick={e=>{e.stopPropagation();setEditingMetric(null);}}>✕</button>
                    </div>
                  </>
                ) : (
                  <>
                    <span>{m.weight??"—"} lbs {delta!=null&&<span style={{ fontSize:10, color:Number(delta)<=0?T.green:T.red }}>{Number(delta)>0?"+":""}{delta}</span>}</span>
                    <span style={{ color:T.muted }}>{m.bodyFat!=null?m.bodyFat+"%":"—"}</span>
                    <button style={{ background:"transparent", border:"none", color:T.dim, cursor:"pointer", fontSize:14, padding:"2px 6px" }} onClick={e=>{e.stopPropagation();if(window.confirm("Delete this entry?"))Storage.deleteMetric(userId,m.date).then(onMetricUpsert);}} title="Delete">×</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const DAY_EXERCISE_ORDER = {
  "Upper Push": ["Barbell Bench Press","Seated DB OHP","Incline DB Press (Push)","Cable Flyes","Lateral Raises","Tricep Pushdowns","Face Pulls"],
  "Lower A":    ["Barbell Back Squat","Leg Press","Romanian Deadlifts","Leg Curls","Leg Extensions","Goblet Squats","Hanging Leg Raises"],
  "Upper Pull": ["Lat Pulldowns","DB Rows","Cable Rows Close","Cable Rows Wide","Incline DB Press (Pull)","OH Tricep Extension","Barbell Curls","Hammer Curls","Face Pulls"],
  "Lower B":    ["Trap Bar Deadlift","Bulgarian Split Squats","Leg Press","Leg Curls","Hip Thrusts","Plank"],
};

function ExerciseMiniCard({ exercise, workouts }) {
  const hist = getExHistory(workouts, exercise);
  if (!hist.length) return null;
  const chartData = hist.map(h => ({ x: h.week, y: Math.round(avgE1rm(h.sets)) }));
  const latest = chartData[chartData.length - 1];
  const first = chartData[0];
  const gain = latest.y - first.y;
  const lastSets = hist[hist.length - 1].sets;
  const lastWeight = lastSets[lastSets.length - 1].weight;

  return (
    <div style={{ ...S.card, padding:"12px 14px" }}>
      <div style={{ fontSize:11, fontWeight:600, color:T.text, marginBottom:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{exercise}</div>
      <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:8 }}>
        <span style={{ fontSize:18, fontWeight:700, color:T.accent }}>{lastWeight}</span>
        <span style={{ fontSize:10, color:T.muted }}>lbs</span>
        {chartData.length >= 2 && (
          <span style={{ fontSize:10, color:gain>=0?T.green:T.red, marginLeft:2 }}>{gain>=0?"+":""}{gain} lbs</span>
        )}
      </div>
      <MiniChart data={chartData} color={T.accent} />
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
        <span style={{ fontSize:9, color:T.dim }}>W{first.x}</span>
        <span style={{ fontSize:9, color:T.dim }}>W{latest.x}</span>
      </div>
    </div>
  );
}

function ProgressTab({ workouts }) {
  const [view, setView] = useState("by-day");
  const [activeDay, setActiveDay] = useState(DAYS[0]);
  const [activeExercise, setActiveExercise] = useState("");

  const allExercises = useMemo(() => {
    const all = [...new Set(workouts.map(w => w.exercise))];
    // sort by day order
    const flat = DAYS.flatMap(d => DAY_EXERCISE_ORDER[d] || []);
    return [...all].sort((a, b) => {
      const ai = flat.indexOf(a), bi = flat.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }, [workouts]);

  useEffect(() => { if (!activeExercise && allExercises.length) setActiveExercise(allExercises[0]); }, [allExercises]);

  function orderedForDay(day) {
    const order = DAY_EXERCISE_ORDER[day] || [];
    const logged = [...new Set(workouts.filter(w => w.day === day).map(w => w.exercise))];
    return [...order.filter(e => logged.includes(e)), ...logged.filter(e => !order.includes(e))];
  }

  const ViewToggle = () => (
    <div style={{ display:"flex", gap:4, marginBottom:20 }}>
      {[["by-day","By Day"],["all","All Exercises"],["single","By Exercise"]].map(([v,label]) => (
        <button key={v} onClick={() => setView(v)}
          style={{ ...S.btnSm, background:view===v?T.accent+"22":T.border, color:view===v?T.accent:T.muted, border:`1px solid ${view===v?T.accent+"55":T.border}` }}>
          {label}
        </button>
      ))}
    </div>
  );

  // ── View 1: By Day ──────────────────────────────────────────────────────────
  if (view === "by-day") return (
    <div>
      <ViewToggle />
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {DAYS.map(d => (
          <button key={d} onClick={() => setActiveDay(d)}
            style={{ ...S.btnSm, background:activeDay===d?DAY_COLORS[d]+"22":T.border, color:activeDay===d?DAY_COLORS[d]:T.muted, border:`1px solid ${activeDay===d?DAY_COLORS[d]+"55":T.border}` }}>
            {d}
          </button>
        ))}
      </div>
      {orderedForDay(activeDay).length === 0
        ? <div style={{ ...S.card, color:T.dim, fontSize:12 }}>No workouts logged for {activeDay} yet.</div>
        : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))", gap:12 }}>
            {orderedForDay(activeDay).map(ex => <ExerciseMiniCard key={ex} exercise={ex} workouts={workouts} />)}
          </div>
      }
    </div>
  );

  // ── View 2: All Exercises ───────────────────────────────────────────────────
  if (view === "all") return (
    <div>
      <ViewToggle />
      {DAYS.map(day => {
        const exercises = orderedForDay(day);
        if (!exercises.length) return null;
        return (
          <div key={day} style={{ marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <div style={{ width:3, height:16, background:DAY_COLORS[day], borderRadius:2 }} />
              <div style={{ fontSize:11, fontWeight:700, color:DAY_COLORS[day], textTransform:"uppercase", letterSpacing:"0.1em" }}>{day}</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:10 }}>
              {exercises.map(ex => <ExerciseMiniCard key={ex} exercise={ex} workouts={workouts} />)}
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── View 3: Single Exercise ─────────────────────────────────────────────────
  if (view === "single") {
    const hist = getExHistory(workouts, activeExercise);
    const chartData = hist.map(h => ({ x: h.week, y: Math.round(avgE1rm(h.sets)) }));
    const gain = chartData.length >= 2 ? chartData[chartData.length-1].y - chartData[0].y : 0;
    const suggestion = getSuggestion(hist, false, activeExercise);
    const [repMin, repMax] = REP_SCHEMES[activeExercise] || [6,8];

    return (
      <div>
        <ViewToggle />
        <div style={{ marginBottom:16 }}>
          <label style={S.label}>Exercise</label>
          <select style={{ ...S.select, maxWidth:320 }} value={activeExercise} onChange={e => setActiveExercise(e.target.value)}>
            {allExercises.map(ex => <option key={ex}>{ex}</option>)}
          </select>
        </div>
        <div style={S.grid2}>
          <div style={S.card}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Weight Trend</div>
            <MiniChart data={chartData} color={T.accent} />
            {chartData.length >= 2 && (
              <div style={{ fontSize:11, color:gain>=0?T.green:T.red, marginTop:8 }}>
                {gain>=0?"+":""}{gain} lbs since W{chartData[0].x}
              </div>
            )}
          </div>
          <div style={S.card}>
            <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Rep Scheme</div>
            <div style={{ fontSize:28, fontWeight:700, color:T.accent }}>{repMin}–{repMax}</div>
            <div style={{ fontSize:11, color:T.muted, marginTop:4 }}>reps per set</div>
            {suggestion && (
              <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${T.border}` }}>
                <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:6 }}>Next Target</div>
                <div style={{ fontSize:22, fontWeight:700, color:T.text }}>{suggestion.suggestedWeight}<span style={{ fontSize:11, color:T.muted }}> lbs</span></div>
                <div style={{ fontSize:11, color:T.dim, marginTop:6, lineHeight:1.5 }}>{suggestion.note}</div>
              </div>
            )}
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize:10, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Session History</div>
          {hist.length === 0 && <div style={{ fontSize:12, color:T.dim }}>No data yet.</div>}
          {[...hist].reverse().map((h,i) => (
            <div key={i} style={{ padding:"10px 0", borderBottom:`1px solid ${T.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <div style={{ fontSize:12, fontWeight:600 }}>Week {h.week} <span style={{ color:T.dim, fontWeight:400 }}>— {h.day}</span></div>
                <span style={{ fontSize:11, color:T.accent, fontWeight:700 }}>e1RM: {Math.round(avgE1rm(h.sets))}</span>
              </div>
              <div style={{ fontSize:11, color:T.muted }}>
                {(() => {
                  const weights = h.sets.map(s => s.weight);
                  const uniform = weights.every(w => w === weights[0]);
                  if (uniform) return <span>{h.sets.map(s=>s.reps).join(", ")} reps @ {weights[0]}lbs</span>;
                  return h.sets.map((s,j) => <span key={j} style={{ marginRight:10 }}>{s.reps}×{s.weight}lbs</span>);
                })()}
              </div>
              {h.notes && <div style={{ fontSize:10, color:T.amber, marginTop:4 }}>⚠ {h.notes}</div>}
            </div>
          ))}
        </div>
      </div>
    );
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SETTINGS TAB
// ─────────────────────────────────────────────────────────────────────────────
function SettingsTab({ darkMode, onToggleDark, user, onSignOut, profileUrl, program, userId, onProgramSave }) {
  const [editProgram, setEditProgram] = useState(()=>JSON.parse(JSON.stringify(program)));
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  // Sync if program prop changes
  useEffect(()=>{ setEditProgram(JSON.parse(JSON.stringify(program))); },[program]);

  function updateDayName(i, name) {
    setEditProgram(p=>{ const d=[...p.days]; d[i]={...d[i],name}; return {...p,days:d}; });
  }
  function updateSets(i, ex, val) {
    setEditProgram(p=>{ const d=[...p.days]; const exList=[...d[i].exercises]; exList[exList.indexOf(ex)]=ex; return {...p,days:d}; });
  }
  function addExercise(dayIdx, ex) {
    if (!ex.trim()) return;
    setEditProgram(p=>{ const d=[...p.days]; d[dayIdx]={...d[dayIdx],exercises:[...d[dayIdx].exercises,ex.trim()]}; return {...p,days:d}; });
  }
  function removeExercise(dayIdx, exIdx) {
    setEditProgram(p=>{ const d=[...p.days]; d[dayIdx]={...d[dayIdx],exercises:d[dayIdx].exercises.filter((_,i)=>i!==exIdx)}; return {...p,days:d}; });
  }
  function moveExercise(dayIdx, exIdx, dir) {
    setEditProgram(p=>{
      const d=[...p.days]; const exs=[...d[dayIdx].exercises];
      const swap=exIdx+dir; if(swap<0||swap>=exs.length) return p;
      [exs[exIdx],exs[swap]]=[exs[swap],exs[exIdx]];
      d[dayIdx]={...d[dayIdx],exercises:exs}; return {...p,days:d};
    });
  }
  function addDay() {
    setEditProgram(p=>({...p,days:[...p.days,{name:`Day ${p.days.length+1}`,exercises:[]}]}));
  }
  function removeDay(i) {
    if (!window.confirm("Remove this day?")) return;
    setEditProgram(p=>({...p,days:p.days.filter((_,j)=>j!==i)}));
  }

  async function saveProgram() {
    setSaving(true);
    await Storage.saveProgram(userId, editProgram);
    onProgramSave(editProgram);
    setSaving(false);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }

  const [newExInputs, setNewExInputs] = useState({});

  return (
    <div style={{ maxWidth:600 }}>
      {/* Appearance */}
      <div style={{ ...S.card, marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:16 }}>Appearance</div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:T.text }}>Theme</div>
            <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{darkMode ? "Dark mode" : "Light mode"}</div>
          </div>
          <div onClick={onToggleDark} style={{ width:48, height:26, borderRadius:13, background:darkMode?T.accent:T.border, cursor:"pointer", position:"relative", transition:"background 0.2s" }}>
            <div style={{ position:"absolute", top:3, left:darkMode?24:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }} />
          </div>
        </div>
      </div>

      {/* Program editor */}
      <div style={{ ...S.card, marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>Program</div>
        <div style={{ fontSize:11, color:T.dim, marginBottom:16 }}>Rename days, reorder or add/remove exercises. Changes take effect immediately in Next Workout.</div>
        {editProgram.days.map((day, dayIdx) => (
          <div key={dayIdx} style={{ ...S.card, marginBottom:12, padding:"12px 14px" }}>
            <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
              <input style={{ ...S.input, fontWeight:700, fontSize:13 }} value={day.name}
                onChange={e=>updateDayName(dayIdx, e.target.value)} />
              <button style={{ background:"transparent", border:"none", color:T.red, cursor:"pointer", fontSize:16, padding:"0 4px" }}
                onClick={()=>removeDay(dayIdx)} title="Remove day">×</button>
            </div>
            {day.exercises.map((ex, exIdx) => (
              <div key={exIdx} style={{ display:"flex", gap:6, alignItems:"center", marginBottom:6 }}>
                <span style={{ flex:1, fontSize:12, color:T.text }}>{ex}</span>
                <span style={{ fontSize:10, color:T.dim, minWidth:60 }}>
                  {defaultSets(ex)}s · {(REP_SCHEMES[ex]||[8,12]).join("–")}r
                </span>
                <button style={{ background:"transparent", border:"none", color:T.muted, cursor:"pointer", fontSize:12 }} onClick={()=>moveExercise(dayIdx,exIdx,-1)}>↑</button>
                <button style={{ background:"transparent", border:"none", color:T.muted, cursor:"pointer", fontSize:12 }} onClick={()=>moveExercise(dayIdx,exIdx,1)}>↓</button>
                <button style={{ background:"transparent", border:"none", color:T.red, cursor:"pointer", fontSize:14 }} onClick={()=>removeExercise(dayIdx,exIdx)}>×</button>
              </div>
            ))}
            <div style={{ display:"flex", gap:6, marginTop:8 }}>
              <input style={{ ...S.input, fontSize:11 }} placeholder="Add exercise…"
                value={newExInputs[dayIdx]||""}
                onChange={e=>setNewExInputs(n=>({...n,[dayIdx]:e.target.value}))}
                onKeyDown={e=>{ if(e.key==="Enter"){ addExercise(dayIdx, newExInputs[dayIdx]||""); setNewExInputs(n=>({...n,[dayIdx]:""})); }}} />
              <button style={S.btnSm} onClick={()=>{ addExercise(dayIdx, newExInputs[dayIdx]||""); setNewExInputs(n=>({...n,[dayIdx]:""})); }}>Add</button>
            </div>
          </div>
        ))}
        <button style={{ ...S.btnSm, marginBottom:14 }} onClick={addDay}>+ Add Day</button>
        <button style={{ ...S.btn, width:"100%" }} onClick={saveProgram} disabled={saving}>
          {saving ? "Saving…" : saved ? "✓ Saved!" : "Save Program"}
        </button>
      </div>

      {/* Account */}
      <div style={{ ...S.card, marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:16 }}>Account</div>
        <div style={{ fontSize:12, color:T.muted, marginBottom:12 }}>{user.email}</div>
        <button style={S.btnDanger} onClick={onSignOut}>Sign out</button>
      </div>

      {/* Public profile */}
      <div style={S.card}>
        <div style={{ fontSize:11, fontWeight:700, color:T.muted, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:12 }}>Public Profile</div>
        <div style={{ fontSize:12, color:T.muted, marginBottom:12 }}>Share your progress publicly — no login required.</div>
        <a href={profileUrl} target="_blank" style={{ ...S.btn, textDecoration:"none", display:"inline-block" }}>View Public Profile →</a>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("overview");
  const [currentWeek, setCurrentWeek] = useState(4);
  const [workouts, setWorkouts] = useState([]);
  const [metrics, setMetrics] = useState([]);
  const [nutrition, setNutrition] = useState([]);
  const [cardio, setCardio] = useState([]);
  const [tick, setTick] = useState(0);
  const [program, setProgram] = useState(DEFAULT_PROGRAM);
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("hj_dark") !== "false"; } catch { return true; }
  });

  // Keep T and S in sync with darkMode
  T = getTheme(darkMode);
  S = getStyles(T);

  function toggleDark() {
    const next = !darkMode;
    setDarkMode(next);
    try { localStorage.setItem("hj_dark", String(next)); } catch {}
  }

  const reload = useCallback(() => setTick(t=>t+1), []);

  useEffect(()=>{
    // Set a fallback so we never hang on "Loading..."
    const timeout = setTimeout(() => setLoading(false), 3000);

    // Check for existing session first
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        const u = { id: session.user.id, email: session.user.email };
        setUser(u);
        setLoading(false);
        clearTimeout(timeout);
      } else {
        setLoading(false);
        clearTimeout(timeout);
      }
    }).catch(() => { setLoading(false); clearTimeout(timeout); });

    // Also listen for future auth changes (sign in, sign out)
    const { data: { subscription } } = sb.auth.onAuthStateChange(async (event, session) => {
      if (event === "SIGNED_IN" && session) {
        const u = { id: session.user.id, email: session.user.email };
        const isChessie = u.email.toLowerCase() === CHESSIE_EMAIL.toLowerCase();
        // Only seed if new user — do it in background, don't block login
        Storage.initUser(u.id, isChessie).catch(console.warn);
        setUser(u);
        setLoading(false);
      } else if (event === "SIGNED_OUT") {
        setUser(null);
        setWorkouts([]); setMetrics([]); setNutrition([]);
      }
    });

    return () => { subscription.unsubscribe(); clearTimeout(timeout); };
  },[]);

  useEffect(()=>{
    if (!user) return;
    async function load() {
      const [w, m, n, p, c] = await Promise.all([
        Storage.getWorkouts(user.id),
        Storage.getMetrics(user.id),
        Storage.getNutrition(user.id),
        Storage.getProgram(user.id),
        Storage.getCardio(user.id),
      ]);
      setWorkouts(w); setMetrics(m); setNutrition(n); setProgram(p); setCardio(c);
    }
    load();
  },[user, tick]);

  async function handleAuth(u) {
    const isChessie = u.email.toLowerCase() === CHESSIE_EMAIL.toLowerCase();
    await Storage.initUser(u.id, isChessie);
    setUser(u);
  }

  async function handleSignOut() {
    await Auth.signOut();
    setUser(null);
    setWorkouts([]); setMetrics([]); setNutrition([]);
  }

  if (loading) return <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", color:T.muted }}>Loading…</div>;
  if (!user) return <AuthScreen onAuth={handleAuth} />;

  const weeksUntilDeload = 6-(currentWeek%6);
  const TABS = ["overview","next workout","progress","body","log","settings"];

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:T.accent, letterSpacing:"0.08em", textTransform:"uppercase" }}>Health Journal</div>
          <div style={{ fontSize:10, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginTop:2 }}>Progressive Overload Tracker</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {isDeloadWeek(currentWeek) && <span style={S.tag(T.green)}>🔄 DELOAD</span>}
          {!isDeloadWeek(currentWeek) && <span style={{ fontSize:11, color:T.dim }}>{weeksUntilDeload}w to deload</span>}
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:11, color:T.dim }}>Week</span>
            <button style={S.btnSm} onClick={()=>setCurrentWeek(w=>Math.max(1,w-1))}>−</button>
            <span style={{ fontSize:16, fontWeight:700, color:T.accent, minWidth:20, textAlign:"center" }}>{currentWeek}</span>
            <button style={S.btnSm} onClick={()=>setCurrentWeek(w=>w+1)}>+</button>
          </div>
        </div>
      </div>
      <div style={S.nav}>
        {TABS.map(t=>(
          <button key={t} style={S.navBtn(tab===t)} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>
      <div style={S.content}>
        {tab==="overview"     && <OverviewTab workouts={workouts} metrics={metrics} nutrition={nutrition} currentWeek={currentWeek} cardio={cardio} />}
        {tab==="next workout" && <NextWorkoutTab workouts={workouts} currentWeek={currentWeek} userId={user.id} onWorkoutAdded={reload} program={program} />}
        {tab==="progress"     && <ProgressTab workouts={workouts} />}
        {tab==="body"         && <BodyTab metrics={metrics} nutrition={nutrition} />}
        {tab==="log"          && <LogTab workouts={workouts} nutrition={nutrition} metrics={metrics} cardio={cardio} currentWeek={currentWeek} userId={user.id} onWorkoutAdded={reload} onNutritionUpsert={reload} onMetricUpsert={reload} onCardioAdded={reload} />}
        {tab==="settings"     && <SettingsTab darkMode={darkMode} onToggleDark={toggleDark} user={user} onSignOut={handleSignOut} profileUrl="https://fcolombo123.github.io/chessiefit/profile" program={program} userId={user.id} onProgramSave={p=>{setProgram(p); reload();}} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
